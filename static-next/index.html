<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Tensies 🎲</title>
  <meta property="og:title" content="Come play Tensies!">
  <meta property="og:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta property="og:image" content="/static/come-play-teaser.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Come play Tensies!">
  <meta name="twitter:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta name="twitter:image" content="/static/come-play-teaser.png">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/logo.svg">

  <!-- First-paint assets, warmed before anything blocks. -->
  <link rel="preload" href="/static/logo.svg" as="image">
  <link rel="preload" href="/static/bar-top.png" as="image">
  <link rel="preload" href="/static/fonts/inter-latin-variable.woff2" as="font" type="font/woff2" crossorigin>

  <!-- ── Critical CSS (inline) ──
       Everything the inline loading screen needs to paint on the first packet:
       design tokens, document reset, the shared logo, and the loading screen.
       Relocated here from tokens.css / loading.css / base.css / landing.css (not
       duplicated — those files own the rest). The interactive screens' CSS loads
       async below so it never blocks this first paint. -->
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 100 900;
      font-display: swap;
      src: url('/static/fonts/inter-latin-variable.woff2') format('woff2');
    }

    :root {
      --accent: #ff4d6d;
      --accent-soft: rgba(255, 77, 109, 0.4);
      --green: #2ecc71;
      --bg: #1a0e08;
      --panel: rgba(8, 4, 1, 0.58);
      --panel-screen: rgba(6, 3, 1, 0.72);
      --field: rgba(20, 10, 5, 0.7);
      --raised: rgba(30, 15, 5, 0.5);
      --raised-hover: rgba(40, 20, 6, 0.6);
      --border: rgba(180, 100, 20, 0.25);
      --border-strong: rgba(170, 115, 45, 0.3);
      --text: #efe3d4;
      --text-warm: rgba(235, 215, 195, 0.92);
      --muted: rgba(214, 188, 158, 0.62);
      --label: rgba(220, 200, 180, 0.72);
      --amber: rgba(225, 180, 100, 0.95);
      --text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
      --text-shadow-lg: 0 2px 8px rgba(0, 0, 0, 0.95), 0 1px 3px rgba(0, 0, 0, 0.8);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    ul, ol { list-style: none; }
    h1, h2, h3, p { font-weight: inherit; font-size: inherit; }
    [hidden] { display: none !important; }

    html { height: 100%; overflow: hidden; overscroll-behavior: none; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #1a0e08 url('/static/bar-top.png') center 10% / cover no-repeat;
      color: var(--text);
      position: fixed;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    .screen:not(.active) { display: none !important; }

    /* Shared logo (loading + landing) */
    .logo-mark {
      width: clamp(110px, 32vw, 160px);
      height: auto;
      display: block;
      margin-bottom: -2.5rem;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.75))
              drop-shadow(0 0 32px rgba(255, 77, 109, 0.35));
    }
    .logo {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow: var(--text-shadow);
      margin-bottom: 0.25rem;
    }

    /* Loading screen */
    #loading {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(2rem + env(safe-area-inset-top)) 2rem calc(2rem + env(safe-area-inset-bottom));
      text-align: center;
      background: rgba(6, 3, 1, 0.72);
      overflow: hidden;
    }
    #loading .logo-mark { margin-bottom: -3.5rem; }
    #loading .logo      { margin-bottom: 2.5rem; }

    #loading .logo-mark, #landing .logo-mark { view-transition-name: logo-mark; }
    #loading .logo,      #landing .logo      { view-transition-name: tensies-wordmark; }
    ::view-transition-group(logo-mark),
    ::view-transition-group(tensies-wordmark) {
      animation-duration: 0.5s;
      animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }
    ::view-transition-old(root),
    ::view-transition-new(root) { animation-duration: 0.5s; }

    #loading-msg {
      margin-top: 1.25rem;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      max-width: 280px;
      line-height: 1.5;
      height: 3.5rem;
    }
    .loading-bar {
      width: min(180px, 55vw);
      height: 6px;
      background: rgba(90, 55, 22, 0.75);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.45);
    }
    .loading-bar-fill {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 35%;
      border-radius: 3px;
      background: linear-gradient(90deg,
        rgba(180, 130, 55, 0.85) 0%,
        rgba(225, 180, 100, 0.95) 70%,
        rgba(250, 220, 155, 1) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 220, 170, 0.18);
      animation: loadingSlide 1.4s linear infinite;
    }
    @keyframes loadingSlide {
      0%   { left: -35%; }
      100% { left: 100%; }
    }

    /* Honour reduced-motion: cut transitions/animations (incl. the indeterminate
       loading bar and the view-transition morph). Only affects users who ask for
       it, so default-motion pixel baselines are unchanged. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      ::view-transition-group(*),
      ::view-transition-old(*),
      ::view-transition-new(*) { animation: none !important; }
    }
  </style>

  <!-- Non-critical CSS — loaded async so it never blocks the loading paint.
       Applied well before the interactive screens appear (after the loading
       min-duration). <noscript> keeps it working with JS disabled. -->
  <link rel="preload" href="/static/css/controls.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="/static/css/shell.css"    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="/static/css/landing.css"  as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="/static/css/lobby.css"    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="/static/css/controls.css">
    <link rel="stylesheet" href="/static/css/shell.css">
    <link rel="stylesheet" href="/static/css/landing.css">
    <link rel="stylesheet" href="/static/css/lobby.css">
  </noscript>

  <!-- Preload the whole module graph so it fetches in parallel instead of
       waterfalling app -> router/net -> components. -->
  <link rel="modulepreload" href="/static/js/app.js">
  <link rel="modulepreload" href="/static/js/state.js">
  <link rel="modulepreload" href="/static/js/util.js">
  <link rel="modulepreload" href="/static/js/names.js">
  <link rel="modulepreload" href="/static/js/transitions.js">
  <link rel="modulepreload" href="/static/js/router.js">
  <link rel="modulepreload" href="/static/js/net.js">
  <link rel="modulepreload" href="/static/js/components/app-header.js">
  <link rel="modulepreload" href="/static/js/components/landing-screen.js">
  <link rel="modulepreload" href="/static/js/components/join-screen.js">
  <link rel="modulepreload" href="/static/js/components/lobby-screen.js">
  <link rel="modulepreload" href="/static/js/components/nav-menu.js">
  <script type="module" src="/static/js/app.js"></script>
</head>
<body>

<main>

  <!-- Inline loading screen: paints from the critical CSS above with no JS.
       The router swaps it for landing/join/lobby/game once the app boots. -->
  <section id="loading" class="screen active" aria-labelledby="loading-msg">
    <img src="/static/logo.svg" class="logo-mark" alt="">
    <h1 class="logo">TENSIES</h1>
    <div class="loading-bar" aria-hidden="true"><div class="loading-bar-fill"></div></div>
    <p id="loading-msg">Loading…</p>
  </section>

  <landing-screen></landing-screen>
  <join-screen></join-screen>
  <lobby-screen></lobby-screen>

</main>

<nav-menu></nav-menu>

</body>
</html>
