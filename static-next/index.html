<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Tensies 🎲</title>
  <meta property="og:title" content="Come play Tensies!">
  <meta property="og:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta property="og:image" content="/static/come-play-teaser.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Come play Tensies!">
  <meta name="twitter:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta name="twitter:image" content="/static/come-play-teaser.png">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/logo.svg">

  <!-- First-paint critical resources: the loading screen below is plain HTML, so
       it renders as soon as these land — no JavaScript in the path. -->
  <link rel="preload" href="/static/logo.svg" as="image">
  <link rel="preload" href="/static/bar-top.png" as="image">
  <link rel="preload" href="/static/fonts/inter-latin-variable.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/shell.css">
  <link rel="stylesheet" href="/static/css/loading.css">
  <link rel="stylesheet" href="/static/css/landing.css">

  <!-- The app (screen components + router) hydrates after first paint. -->
  <link rel="modulepreload" href="/static/js/app.js">
  <script type="module" src="/static/js/app.js"></script>
</head>
<body>

<main>

  <!-- Loading screen is inline HTML (not a component) so it paints immediately,
       before app.js runs. The app swaps it for landing/join/lobby/game once the
       router boots. -->
  <section id="loading" class="screen active" aria-labelledby="loading-msg">
    <img src="/static/logo.svg" class="logo-mark" alt="">
    <h1 class="logo">TENSIES</h1>
    <div class="loading-bar" aria-hidden="true"><div class="loading-bar-fill"></div></div>
    <p id="loading-msg">Loading…</p>
  </section>

  <landing-screen></landing-screen>
  <join-screen></join-screen>

</main>

<nav-menu></nav-menu>

</body>
</html>
