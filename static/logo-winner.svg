<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Tensies">
  <!-- Winner-screen variant of logo.svg: adds a glowing warm rim around the
       dice edges (like the round pill's lit rim). The global logo is unchanged. -->
  <defs>
    <filter id="w-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="w-rim" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <!-- Rim glow: brightest at the top-right corner, falling off toward the
         rest of the edge (per die — light source from the top-right). -->
    <radialGradient id="w-rimg" cx="1" cy="0" r="1.25">
      <stop offset="0"    stop-color="#fff4dc"/>
      <stop offset="0.32" stop-color="#ffc074"/>
      <stop offset="0.7"  stop-color="#cf924c" stop-opacity="0.5"/>
      <stop offset="1"    stop-color="#9c6a35" stop-opacity="0.12"/>
    </radialGradient>
    <linearGradient id="w-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b85"/>
      <stop offset="1" stop-color="#e63a59"/>
    </linearGradient>
    <linearGradient id="w-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcd9e8"/>
    </linearGradient>
  </defs>

  <!-- Accent halo behind back die -->
  <g transform="translate(74 80) rotate(-14)" opacity="0.55">
    <rect x="-46" y="-46" width="92" height="92" rx="20" fill="#ff4d6d" filter="url(#w-glow)"/>
  </g>

  <!-- Back die: pink, showing 6 -->
  <g transform="translate(74 80) rotate(-14)">
    <!-- glowing warm rim (brighter top-right, subtle bottom-left) -->
    <rect x="-40" y="-40" width="80" height="80" rx="15" fill="none" stroke="url(#w-rimg)" stroke-width="6.5" filter="url(#w-rim)"/>
    <rect x="-40" y="-40" width="80" height="80" rx="15" fill="url(#w-pink)" stroke="url(#w-rimg)" stroke-width="2.2"/>
    <!-- slight halo blooming from the top-right corner -->
    <circle cx="34" cy="-34" r="15" fill="#ffe7c2" opacity="0.65" filter="url(#w-glow)"/>
    <rect x="-37" y="-37" width="74" height="20" rx="9" fill="#ffffff" opacity="0.12"/>
    <circle cx="-20" cy="-22" r="6" fill="#fff"/>
    <circle cx="-20" cy="0"   r="6" fill="#fff"/>
    <circle cx="-20" cy="22"  r="6" fill="#fff"/>
    <circle cx="20"  cy="-22" r="6" fill="#fff"/>
    <circle cx="20"  cy="0"   r="6" fill="#fff"/>
    <circle cx="20"  cy="22"  r="6" fill="#fff"/>
  </g>

  <!-- Front die: white, showing 4 -->
  <g transform="translate(132 130) rotate(10)">
    <rect x="-39" y="-39" width="78" height="78" rx="14" fill="#1a1a2e" opacity="0.35" transform="translate(3 5)"/>
    <!-- glowing warm rim (brighter top-right, subtle bottom-left) -->
    <rect x="-38" y="-38" width="76" height="76" rx="14" fill="none" stroke="url(#w-rimg)" stroke-width="6.5" filter="url(#w-rim)"/>
    <rect x="-38" y="-38" width="76" height="76" rx="14" fill="url(#w-white)" stroke="url(#w-rimg)" stroke-width="2.2"/>
    <rect x="-35" y="-35" width="70" height="18" rx="8" fill="#ffffff" opacity="0.6"/>
    <circle cx="-19" cy="-19" r="6" fill="#1a1a2e"/>
    <circle cx="19"  cy="-19" r="6" fill="#1a1a2e"/>
    <circle cx="-19" cy="19"  r="6" fill="#1a1a2e"/>
    <circle cx="19"  cy="19"  r="6" fill="#1a1a2e"/>
  </g>
</svg>
