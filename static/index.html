<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tensies 🎲</title>
  <style>
    :root {
      --bg: #0d0d1a;
      --card: #1a1b2e;
      --card2: #22243a;
      --accent: #ff4d6d;
      --green: #2ecc71;
      --text: #e8e8f0;
      --muted: #777;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Screens ── */
    .screen:not(.active) { display: none !important; }

    /* ── Landing ── */
    #landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(255, 77, 109, 0.4);
      margin-bottom: 0.25rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }

    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 320px;
    }

    input {
      padding: 0.85rem 1rem;
      border: 2px solid #2a2b40;
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 0.05em;
    }
    input::placeholder { color: var(--muted); letter-spacing: normal; }
    input:focus { border-color: var(--accent); }
    input.code-input { text-transform: uppercase; letter-spacing: 0.3em; font-weight: 700; font-size: 1.3rem; }

    .btn {
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.05em;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--card2); color: var(--text); }

    .divider { color: var(--muted); font-size: 0.85rem; }

    #join-form { display: none; flex-direction: column; gap: 0.75rem; }
    #join-form.visible { display: flex; }

    .error-msg {
      color: var(--accent);
      font-size: 0.9rem;
      min-height: 1.4rem;
      text-align: center;
    }

    /* ── Lobby ── */
    #lobby {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    .lobby-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .lobby-hint  { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    .code-display {
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.3em;
      color: var(--accent);
      background: var(--card);
      padding: 1rem 2rem;
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
      margin-bottom: 0.5rem;
      transition: background 0.2s;
    }
    .code-display:hover { background: var(--card2); }

    .copy-hint { color: var(--muted); font-size: 0.8rem; margin-bottom: 2rem; }
    .copied { color: var(--green) !important; }

    .player-list {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .player-list-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--card);
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-weight: 600;
    }

    .host-badge {
      font-size: 0.7rem;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      margin-left: auto;
    }

    .you-badge { font-size: 0.7rem; color: var(--muted); margin-left: auto; }

    #waiting-msg { color: var(--muted); font-size: 0.95rem; }

    /* ── Game ── */
    #game {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }

    /* ── Round header (centered in play area) ── */
    .round-header {
      text-align: center;
      flex-shrink: 0;
      padding: 2.25rem 0;
    }

    .round-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .round-target-die {
      --sz: 56px;
      width: var(--sz);
      height: var(--sz);
      background: var(--accent);
      border-radius: 11px;
      display: grid;
      grid-template: repeat(3, 1fr) / repeat(3, 1fr);
      padding: 8px;
      gap: 3px;
      margin: 0 auto;
      box-shadow: 0 0 24px rgba(255,77,109,0.45);
    }
    .round-target-die .dot { border-radius: 50%; }
    .round-target-die .dot.active { background: #fff; }

    /* ── Game top bar ── */
    .game-topbar {
      background: #0d0e1c;
      border-bottom: 3px solid #0a0a14;
      flex-shrink: 0;
    }

    .game-title {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #2a2b40;
    }

    /* ── Players bar (horizontal) ── */
    .players-bar {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0.7rem 1rem;
    }
    .players-bar::-webkit-scrollbar { display: none; }

    .player-mini {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 72px;
      max-width: 160px;
    }

    .player-mini-top {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }

    .player-mini-name {
      font-size: 0.82rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .player-mini-you {
      font-size: 0.6rem;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .player-mini-wins {
      font-size: 0.65rem;
      background: var(--card2);
      padding: 0.12rem 0.4rem;
      border-radius: 8px;
      font-weight: 700;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .player-mini-wins.leading { background: var(--card2); color: var(--text); }

    .player-mini-progress {
      height: 6px;
      background: #2a2b40;
      border-radius: 3px;
      overflow: hidden;
    }

    .player-mini-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--green);
      transition: width 0.3s ease;
    }
    .player-mini-fill.me  { background: #5b8dee; }
    .player-mini-fill.hot { background: var(--accent); }

    .player-mini-count {
      font-size: 0.66rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .player-mini-count.hot { color: var(--accent); font-weight: 700; }

    /* ── My area ── */
    .my-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 1rem 0.75rem;
      min-height: 0;
      overflow: hidden;
    }

    .my-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      flex-shrink: 0;
    }

    .my-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .my-locked {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .my-locked .locked-count { color: var(--green); font-weight: 700; }

    /* ── Dice zones ── */
    .dice-zones {
      flex: 1;
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
      min-height: 0;
    }

    .zone-unmatched {
      flex: 1;
      position: relative; /* absolute-positioned dice children */
    }

    /* wrapper handles position + tilt; die handles rolling animation */
    .die-wrapper { position: absolute; }

    .zone-divider {
      width: 1px;
      background: #2a2b40;
      flex-shrink: 0;
    }

    .zone-matched {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
      justify-content: flex-end;
      padding-top: 1rem;
      /* fixed width = 2 dice + gap — never reflows */
      width: calc(2 * 56px + 6px);
      flex-shrink: 0;
    }

    /* Slight skew on matched dice (targets the scene container) */
    .zone-matched .die-scene:nth-child(3n)   { transform: rotate(3.5deg); }
    .zone-matched .die-scene:nth-child(3n+1) { transform: rotate(-2.5deg); }
    .zone-matched .die-scene:nth-child(3n+2) { transform: rotate(1.5deg); }

    /* ── Die (3-D cube) ── */
    .die-scene {
      width: 56px;
      height: 56px;
      perspective: 160px;
      flex-shrink: 0;
      display: inline-block;
    }

    .die-3d {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }

    /* Six faces */
    .face {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: #fff;
      display: grid;
      grid-template: repeat(3, 1fr) / repeat(3, 1fr);
      padding: 7px;
      gap: 2px;
      box-shadow: 1px 3px 10px rgba(0,0,0,0.55);
      backface-visibility: hidden;
    }
    .face .dot { border-radius: 50%; }
    .face .dot.active { background: #1a1a2e; }

    /* Face placement on cube (half-size = 28px) */
    .face-1 { transform: translateZ(28px); }
    .face-6 { transform: rotateY(180deg)  translateZ(28px); }
    .face-2 { transform: rotateY(90deg)   translateZ(28px); }
    .face-5 { transform: rotateY(-90deg)  translateZ(28px); }
    .face-3 { transform: rotateX(-90deg)  translateZ(28px); }
    .face-4 { transform: rotateX(90deg)   translateZ(28px); }

    /* Match highlight — styles all faces; only the visible one matters */
    .die-3d.match .face {
      background: #d4f8d4;
      box-shadow: 0 0 12px rgba(46,204,113,0.65);
    }
    .die-3d.match .face .dot.active { background: #1a5c1a; }

    /* 3-D tumble animations — three variants so dice look unsynchronised */
    @keyframes tumble3d-a {
      0%   { transform: rotateX(0deg)   rotateY(0deg); }
      100% { transform: rotateX(360deg) rotateY(500deg); }
    }
    @keyframes tumble3d-b {
      0%   { transform: rotateX(0deg)   rotateY(0deg)    rotateZ(0deg); }
      100% { transform: rotateX(480deg) rotateY(-300deg) rotateZ(200deg); }
    }
    @keyframes tumble3d-c {
      0%   { transform: rotateY(0deg)    rotateZ(0deg); }
      100% { transform: rotateY(-450deg) rotateZ(270deg); }
    }
    .die-3d.tumbling-a { animation: tumble3d-a 0.50s linear infinite; }
    .die-3d.tumbling-b { animation: tumble3d-b 0.65s linear infinite; }
    .die-3d.tumbling-c { animation: tumble3d-c 0.45s linear infinite; }

    /* Landing bounce — standalone `scale` doesn't clobber wrapper's rotate transform */
    @keyframes dieBounceLand {
      0%   { scale: 1.2; }
      50%  { scale: 0.9; }
      78%  { scale: 1.05; }
      100% { scale: 1; }
    }
    .die-wrapper.landing { animation: dieBounceLand 0.38s ease-out forwards; }

    /* Newly-matched dice lift off from where they landed before moving to the side */
    @keyframes dieLiftOff {
      0%   { scale: 1;   opacity: 1; }
      40%  { scale: 1.2; opacity: 1; }
      100% { scale: 0;   opacity: 0; }
    }
    .die-wrapper.lifting { animation: dieLiftOff 0.28s ease-in forwards; }

    /* New matched dice pop into the matched zone */
    @keyframes matchPop {
      0%   { scale: 0; opacity: 0; }
      60%  { scale: 1.18; }
      100% { scale: 1; opacity: 1; }
    }
    .die-scene.popping { animation: matchPop 0.32s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    @media (max-width: 480px) {
      .die-scene { width: 50px; height: 50px; }
      .face { padding: 6px; }
      .face-1 { transform: translateZ(25px); }
      .face-6 { transform: rotateY(180deg)  translateZ(25px); }
      .face-2 { transform: rotateY(90deg)   translateZ(25px); }
      .face-5 { transform: rotateY(-90deg)  translateZ(25px); }
      .face-3 { transform: rotateX(-90deg)  translateZ(25px); }
      .face-4 { transform: rotateX(90deg)   translateZ(25px); }
      .zone-matched { width: calc(2 * 50px + 6px); }
    }

    /* ── Roll button ── */
    .roll-area {
      text-align: center;
      padding-top: 0.85rem;
      flex-shrink: 0;
    }

    .btn-roll {
      font-size: 1.25rem;
      padding: 0.85rem 3.5rem;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(46,204,113,0.35);
    }
    .btn-roll:hover:not(:disabled) { opacity: 0.88; transform: translateY(-2px); }
    .btn-roll:active:not(:disabled) { transform: translateY(0); }
    .btn-roll:disabled { background: #444; box-shadow: none; cursor: not-allowed; opacity: 0.5; }

    /* ── Winner overlay ── */
    #winner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #winner-overlay.visible { display: flex; }

    .winner-box {
      background: var(--card);
      border: 3px solid var(--accent);
      border-radius: 20px;
      padding: 3rem 4rem;
      text-align: center;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .winner-label { color: var(--muted); font-size: 1rem; text-transform: uppercase; letter-spacing: 0.15em; }
    .winner-name  { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; color: var(--accent); margin: 0.5rem 0; }
    .winner-sub   { color: var(--muted); font-size: 1rem; margin-top: 0.75rem; }
    .confetti { font-size: 3rem; }

    @media (max-width: 480px) {
      .winner-box { padding: 2rem; }
    }
  </style>
</head>
<body>

<!-- Landing -->
<div id="landing" class="screen active">
  <div class="logo">TENSIES</div>
  <div class="tagline">Roll all ten to win the round</div>
  <div class="form-stack">
    <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" onclick="createGame()">Create Game</button>
    <div class="divider">— or —</div>
    <button class="btn btn-secondary" onclick="toggleJoin()">Join Game</button>
    <div id="join-form">
      <input id="code-input" class="code-input" type="text" placeholder="ABCDE" maxlength="5" autocomplete="off">
      <button class="btn btn-primary" onclick="joinGame()">Join</button>
    </div>
    <div class="error-msg" id="landing-error"></div>
  </div>
</div>

<!-- Lobby -->
<div id="lobby" class="screen">
  <div class="lobby-title">Waiting for players…</div>
  <div class="lobby-hint">Share this code with friends</div>
  <div class="code-display" id="lobby-code" onclick="copyCode()">——</div>
  <div class="copy-hint" id="copy-hint">click to copy</div>
  <div class="player-list" id="lobby-players"></div>
  <button id="start-btn" class="btn btn-primary" style="width:100%;max-width:400px;display:none" onclick="startGame()">
    Start Game 🎲
  </button>
  <div id="waiting-msg"></div>
</div>

<!-- Game -->
<div id="game" class="screen">
  <!-- Top bar: round + target -->
  <!-- Top bar: title + players -->
  <div class="game-topbar">
    <div class="game-title">Tensies</div>
    <div class="players-bar" id="players-bar"></div>
  </div>

  <!-- My dice -->
  <div class="my-area" id="my-area"></div>
</div>

<!-- Winner overlay -->
<div id="winner-overlay">
  <div class="winner-box">
    <div class="confetti">🎉</div>
    <div class="winner-label">Round Winner</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-sub" id="winner-sub"></div>
  </div>
</div>

<script>
  const DOTS = {
    0: [],
    1: [4],
    2: [2, 6],
    3: [2, 4, 6],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8],
  };

  // Cube rotation (applied to .die-3d) to bring each face value to the front
  const FACE_ROTATIONS = {
    1: 'rotateY(0deg)',
    2: 'rotateY(-90deg)',
    3: 'rotateX(90deg)',
    4: 'rotateX(-90deg)',
    5: 'rotateY(90deg)',
    6: 'rotateY(180deg)',
  };

  function makeDie(value, target) {
    const scene = document.createElement("div");
    scene.className = "die-scene";

    const cube = document.createElement("div");
    cube.className = "die-3d" + (value === target && value !== 0 ? " match" : "");
    cube.style.transform = FACE_ROTATIONS[value] || 'rotateY(0deg)';

    // Build all 6 faces with their dot patterns
    for (let fv = 1; fv <= 6; fv++) {
      const face = document.createElement("div");
      face.className = "face face-" + fv;
      for (let i = 0; i < 9; i++) {
        const dot = document.createElement("span");
        dot.className = "dot" + (DOTS[fv].includes(i) ? " active" : "");
        face.appendChild(dot);
      }
      cube.appendChild(face);
    }

    scene.appendChild(cube);
    return scene;
  }

  function esc(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ── State ──
  let ws = null;
  let myId = null;
  let gameCode = null;
  let rolling = false;
  let currentState = null;
  let lastMyDiceKey = null;
  let myRollPending = false;
  let rollShakeEnd = 0;
  let rollPendingState = null;
  let shakeCycleInterval = null;
  let prevMatchedCount = 0;
  let pendingRollTimeouts = [];

  function myDiceKey(state) {
    const p = state.players[myId];
    if (!p) return null;
    return JSON.stringify({ dice: p.dice, has_rolled: p.has_rolled, target: state.target, round_num: state.round_num });
  }

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ── Landing ──
  function toggleJoin() {
    const f = document.getElementById("join-form");
    f.classList.toggle("visible");
    if (f.classList.contains("visible")) document.getElementById("code-input").focus();
  }

  function getName() {
    return document.getElementById("name-input").value.trim() || "Player";
  }

  function setError(msg) {
    document.getElementById("landing-error").textContent = msg;
  }

  function connectWS(afterConnect) {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => afterConnect();
    ws.onmessage = evt => handleMessage(JSON.parse(evt.data));
    ws.onclose = () => { if (currentState) alert("Connection lost. Refresh to reconnect."); };
  }

  function createGame() {
    connectWS(() => ws.send(JSON.stringify({ action: "create", name: getName() })));
  }

  function joinGame() {
    const code = document.getElementById("code-input").value.trim();
    if (!code) { setError("Enter a game code"); return; }
    connectWS(() => ws.send(JSON.stringify({ action: "join", name: getName(), code })));
  }

  // ── Lobby ──
  function copyCode() {
    if (!gameCode) return;
    navigator.clipboard.writeText(gameCode).then(() => {
      const hint = document.getElementById("copy-hint");
      hint.textContent = "copied!";
      hint.classList.add("copied");
      setTimeout(() => { hint.textContent = "click to copy"; hint.classList.remove("copied"); }, 2000);
    });
  }

  function startGame() {
    ws.send(JSON.stringify({ action: "start" }));
  }

  function renderLobby(state) {
    gameCode = state.code;
    document.getElementById("lobby-code").textContent = state.code;
    const list = document.getElementById("lobby-players");
    list.innerHTML = "";
    Object.entries(state.players).forEach(([pid, p]) => {
      const li = document.createElement("div");
      li.className = "player-list-item";
      li.innerHTML = `🎲 ${esc(p.name)}`;
      if (pid === state.host) {
        const b = document.createElement("span"); b.className = "host-badge"; b.textContent = "HOST";
        li.appendChild(b);
      } else if (pid === myId) {
        const b = document.createElement("span"); b.className = "you-badge"; b.textContent = "you";
        li.appendChild(b);
      }
      list.appendChild(li);
    });
    const startBtn = document.getElementById("start-btn");
    const waitMsg  = document.getElementById("waiting-msg");
    if (state.host === myId) {
      startBtn.style.display = "block";
      waitMsg.textContent = Object.keys(state.players).length < 2 ? "Invite friends — or start solo!" : "";
    } else {
      startBtn.style.display = "none";
      waitMsg.textContent = "Waiting for the host to start…";
    }
  }

  // ── Game ──
  function maxWins(state) {
    return Math.max(0, ...Object.values(state.players).map(p => p.wins));
  }

  function makeTargetDie(target, className) {
    const el = document.createElement("div");
    el.className = className;
    for (let i = 0; i < 9; i++) {
      const dot = document.createElement("span");
      dot.className = "dot" + (DOTS[target].includes(i) ? " active" : "");
      el.appendChild(dot);
    }
    return el;
  }

  function renderPlayersBar(state) {
    const top = maxWins(state);
    const bar = document.getElementById("players-bar");
    bar.innerHTML = "";

    // Sort: me first, then others by wins desc
    const sorted = Object.entries(state.players).sort(([aId, a], [bId, b]) => {
      if (aId === myId) return -1;
      if (bId === myId) return  1;
      return b.wins - a.wins;
    });

    sorted.forEach(([pid, p]) => {
      const isMe    = pid === myId;
      const matched = p.has_rolled ? p.dice.filter(d => d === state.target).length : 0;
      const hot     = !isMe && matched >= 7;

      const card = document.createElement("div");
      card.className = "player-mini";

      // Top row: name + YOU tag + wins badge
      const topRow = document.createElement("div");
      topRow.className = "player-mini-top";

      const name = document.createElement("div");
      name.className = "player-mini-name";
      name.textContent = p.name;
      topRow.appendChild(name);

      if (isMe) {
        const you = document.createElement("span");
        you.className = "player-mini-you";
        you.textContent = "you";
        topRow.appendChild(you);
      }

      const wins = document.createElement("div");
      wins.className = "player-mini-wins" + (p.wins > 0 && p.wins === top ? " leading" : "");
      wins.textContent = `${p.wins}W`;
      topRow.appendChild(wins);

      card.appendChild(topRow);

      // Progress bar
      const prog = document.createElement("div");
      prog.className = "player-mini-progress";
      const fill = document.createElement("div");
      fill.className = "player-mini-fill" + (isMe ? " me" : hot ? " hot" : "");
      fill.style.width = `${(matched / 10) * 100}%`;
      prog.appendChild(fill);
      card.appendChild(prog);

      // Count
      const count = document.createElement("div");
      count.className = "player-mini-count" + (hot ? " hot" : "");
      count.textContent = `${matched}/10`;
      card.appendChild(count);

      bar.appendChild(card);
    });
  }

  function renderMyArea(state, isRollResult = false) {
    const player  = state.players[myId];
    if (!player) return;

    const effectiveTarget = player.has_rolled ? state.target : -1;
    const matched   = player.dice.filter(d => d === effectiveTarget);
    const unmatched = player.dice.filter(d => d !== effectiveTarget);

    const area = document.getElementById("my-area");
    area.innerHTML = "";

    // Round + target die header
    const roundHeader = document.createElement("div");
    roundHeader.className = "round-header";
    const roundLbl = document.createElement("div");
    roundLbl.className = "round-label";
    roundLbl.textContent = `Round ${state.round_num}`;
    roundHeader.appendChild(roundLbl);
    roundHeader.appendChild(makeTargetDie(state.target, "round-target-die"));
    area.appendChild(roundHeader);

    // Dice header
    const header = document.createElement("div");
    header.className = "my-header";
    header.innerHTML = `<div class="my-label">Your dice</div>`;
    const lockedEl = document.createElement("div");
    lockedEl.className = "my-locked";
    lockedEl.innerHTML = matched.length > 0
      ? `<span class="locked-count">${matched.length}</span>/${player.dice.length} locked`
      : `0/${player.dice.length}`;
    header.appendChild(lockedEl);
    area.appendChild(header);

    // Dice zones
    const zones = document.createElement("div");
    zones.className = "dice-zones";

    const unmatchedZone = document.createElement("div");
    unmatchedZone.className = "zone-unmatched";

    // Place dice after layout so we can measure the zone's real dimensions
    const diceToPlace = [...unmatched];
    requestAnimationFrame(() => {
      const rect    = unmatchedZone.getBoundingClientRect();
      const sz      = window.innerWidth <= 480 ? 50 : 56;
      const pad     = 8;
      const gap     = sz + 6; // min centre-to-centre distance
      const placed  = [];

      diceToPlace.forEach(v => {
        let x, y, tries = 0;
        do {
          x = pad + Math.random() * (rect.width  - sz - pad * 2);
          y = pad + Math.random() * (rect.height - sz - pad * 2);
          tries++;
        } while (tries < 200 && placed.some(p =>
          Math.abs(p.x - x) < gap && Math.abs(p.y - y) < gap
        ));

        placed.push({ x, y });
        const rot     = (Math.random() - 0.5) * 24; // ±12°
        const wrapper = document.createElement("div");
        wrapper.className = isRollResult ? "die-wrapper landing" : "die-wrapper";
        wrapper.style.left      = x + "px";
        wrapper.style.top       = y + "px";
        wrapper.style.transform = `rotate(${rot}deg)`;
        wrapper.appendChild(makeDie(v, effectiveTarget));
        unmatchedZone.appendChild(wrapper);
      });
    });
    zones.appendChild(unmatchedZone);

    zones.appendChild(Object.assign(document.createElement("div"), { className: "zone-divider" }));
    const matchedZone = document.createElement("div");
    matchedZone.className = "zone-matched";
    if (isRollResult) {
      // Previously-matched dice appear immediately (they were already set aside)
      matched.slice(0, prevMatchedCount).forEach(v => matchedZone.appendChild(makeDie(v, effectiveTarget)));
      // Newly-matched dice pop in after the landing bounce settles (~380ms)
      if (matched.length > prevMatchedCount) {
        setTimeout(() => {
          matched.slice(prevMatchedCount).forEach(v => {
            const scene = makeDie(v, effectiveTarget);
            scene.classList.add("popping");
            matchedZone.appendChild(scene);
          });
        }, 380);
      }
    } else {
      matched.forEach(v => matchedZone.appendChild(makeDie(v, effectiveTarget)));
    }
    zones.appendChild(matchedZone);

    area.appendChild(zones);

    // Roll button
    const rollArea = document.createElement("div");
    rollArea.className = "roll-area";
    const btn = document.createElement("button");
    btn.className = "btn-roll";
    btn.id = "roll-btn";
    btn.textContent = "Roll";
    btn.onclick = roll;
    rollArea.appendChild(btn);
    area.appendChild(rollArea);
  }

  function startShake() {
    const gatherMs = 200;
    const shakeMs  = 300 + Math.random() * 400; // 300–700 ms in-hand
    rollShakeEnd   = Date.now() + gatherMs + shakeMs;

    const wrappers = [...document.querySelectorAll('.zone-unmatched .die-wrapper')];
    const zone     = document.querySelector('.zone-unmatched');
    const sz       = window.innerWidth <= 480 ? 50 : 56;

    if (zone && wrappers.length) {
      const rect = zone.getBoundingClientRect();
      const cx   = (rect.width  - sz) / 2;
      const cy   = (rect.height - sz) / 2;
      // Gather all dice to a tight bunch at the centre (like cupped in hand)
      wrappers.forEach(wrapper => {
        const ox  = (Math.random() - 0.5) * 44;
        const oy  = (Math.random() - 0.5) * 44;
        const rot = (Math.random() - 0.5) * 30;
        wrapper.style.transition = `left ${gatherMs}ms ease-in, top ${gatherMs}ms ease-in`;
        wrapper.style.left      = (cx + ox) + 'px';
        wrapper.style.top       = (cy + oy) + 'px';
        wrapper.style.transform = `rotate(${rot}deg)`;
      });
    }

    // After gather completes, start 3-D tumble in place
    const gatherT = setTimeout(() => {
      const anims = ['tumbling-a', 'tumbling-b', 'tumbling-c'];
      wrappers.forEach(wrapper => {
        wrapper.style.transition = '';
        const cube = wrapper.querySelector('.die-3d');
        if (cube) {
          cube.classList.add(anims[Math.floor(Math.random() * 3)]);
          cube.style.animationDelay = `-${Math.floor(Math.random() * 500)}ms`;
        }
      });
    }, gatherMs);
    pendingRollTimeouts.push(gatherT);
  }

  function stopShake() {
    // Wrappers are kept in place; face/animation updates handled by updateDiceInPlace
  }

  function applyRollResult(state) {
    stopShake();
    rollPendingState = null;
    updateDiceInPlace(state);
  }

  function updateDiceInPlace(state) {
    // Cancel any pending animations from a previous roll
    pendingRollTimeouts.forEach(clearTimeout);
    pendingRollTimeouts = [];
    document.querySelectorAll('.zone-unmatched .die-wrapper.lifting').forEach(w => w.remove());

    const player   = state.players[myId];
    const wrappers = [...document.querySelectorAll('.zone-unmatched .die-wrapper')];
    if (!player || wrappers.length === 0) {
      rolling = false;
      renderMyArea(state, false);
      const btn = document.getElementById('roll-btn');
      if (btn) btn.disabled = false;
      return;
    }

    const effectiveTarget  = player.has_rolled ? state.target : -1;
    const newMatched       = player.dice.filter(d => d === effectiveTarget);
    const newUnmatched     = player.dice.filter(d => d !== effectiveTarget);
    const newlyMatchedCount = Math.max(0, newMatched.length - prevMatchedCount);

    // ── Phase 1: scatter dice from the bunch to final resting positions ──
    const zone    = document.querySelector('.zone-unmatched');
    const sz      = window.innerWidth <= 480 ? 50 : 56;
    const pad     = 8;
    const gap     = sz + 6;
    const scatterMs = 320;
    const finalPositions = [];

    if (zone) {
      const rect   = zone.getBoundingClientRect();
      const placed = [];
      wrappers.forEach(() => {
        let x, y, tries = 0;
        do {
          x = pad + Math.random() * (rect.width  - sz - pad * 2);
          y = pad + Math.random() * (rect.height - sz - pad * 2);
          tries++;
        } while (tries < 200 && placed.some(p =>
          Math.abs(p.x - x) < gap && Math.abs(p.y - y) < gap
        ));
        placed.push({ x, y });
        finalPositions.push({ x, y, rot: (Math.random() - 0.5) * 24 });
      });

      // Dice keep tumbling while they travel — remove transition block on cube
      wrappers.forEach((wrapper, i) => {
        const p = finalPositions[i];
        wrapper.style.transition = `left ${scatterMs}ms ease-out, top ${scatterMs}ms ease-out`;
        wrapper.style.left       = p.x + 'px';
        wrapper.style.top        = p.y + 'px';
        // Don't override transform here so the 3-D rotation keeps playing
      });
    }

    // ── Phase 2: after scatter, stop tumbling and reveal face values ──
    const revealT = setTimeout(() => {
      // Clear transitions so landing bounce isn't throttled
      wrappers.forEach((wrapper, i) => {
        wrapper.style.transition = '';
        if (finalPositions[i]) {
          wrapper.style.transform = `rotate(${finalPositions[i].rot}deg)`;
        }
      });

      // Update locked-count label
      const lockedEl = document.querySelector('.my-locked');
      if (lockedEl) {
        lockedEl.innerHTML = newMatched.length > 0
          ? `<span class="locked-count">${newMatched.length}</span>/${player.dice.length} locked`
          : `0/${player.dice.length}`;
      }

      // Unmatched dice: reveal face + landing bounce in place
      newUnmatched.forEach((v, i) => {
        const wrapper = wrappers[i];
        if (!wrapper) return;
        const cube = wrapper.querySelector('.die-3d');
        if (!cube) return;
        cube.classList.remove('tumbling-a', 'tumbling-b', 'tumbling-c');
        cube.style.animationDelay = '';
        cube.className = 'die-3d';
        cube.style.transform = FACE_ROTATIONS[v] || 'rotateY(0deg)';
        wrapper.classList.remove('landing');
        void wrapper.offsetWidth;
        wrapper.classList.add('landing');
      });

      // Newly-matched dice: reveal as matched, bounce, then lift off
      for (let i = 0; i < newlyMatchedCount; i++) {
        const wrapper = wrappers[newUnmatched.length + i];
        if (!wrapper) continue;
        const cube = wrapper.querySelector('.die-3d');
        const v    = newMatched[prevMatchedCount + i];
        if (cube) {
          cube.classList.remove('tumbling-a', 'tumbling-b', 'tumbling-c');
          cube.style.animationDelay = '';
          cube.className = 'die-3d match';
          cube.style.transform = FACE_ROTATIONS[v] || 'rotateY(0deg)';
          wrapper.classList.remove('landing');
          void wrapper.offsetWidth;
          wrapper.classList.add('landing');
        }
        const liftT = setTimeout(() => {
          wrapper.classList.remove('landing');
          wrapper.classList.add('lifting');
          const removeT = setTimeout(() => wrapper.remove(), 280);
          pendingRollTimeouts.push(removeT);
        }, 400);
        pendingRollTimeouts.push(liftT);
      }

      // Pop newly matched dice into the side zone
      const matchedZone = document.querySelector('.zone-matched');
      if (matchedZone && newlyMatchedCount > 0) {
        const popT = setTimeout(() => {
          for (let i = prevMatchedCount; i < newMatched.length; i++) {
            const scene = makeDie(newMatched[i], effectiveTarget);
            scene.classList.add('popping');
            matchedZone.appendChild(scene);
          }
        }, 500);
        pendingRollTimeouts.push(popT);
      }

      rolling = false;
      const btn = document.getElementById('roll-btn');
      if (newlyMatchedCount > 0) {
        const reenableT = setTimeout(() => { if (btn) btn.disabled = false; }, 680);
        pendingRollTimeouts.push(reenableT);
      } else {
        if (btn) btn.disabled = false;
      }
    }, scatterMs);

    pendingRollTimeouts.push(revealT);
  }

  function renderGame(state) {
    currentState = state;
    renderPlayersBar(state);
    const key = myDiceKey(state);
    if (myRollPending || key !== lastMyDiceKey) {
      lastMyDiceKey = key;
      if (myRollPending) {
        myRollPending = false;
        const remaining = rollShakeEnd - Date.now();
        if (remaining > 50) {
          rollPendingState = state;
          setTimeout(() => applyRollResult(rollPendingState || state), remaining);
        } else {
          applyRollResult(state);
        }
      } else {
        // Round transition or other player event — no landing animation
        rolling = false;
        renderMyArea(state, false);
      }
    }
  }

  function roll() {
    if (rolling) return;
    rolling = true;
    myRollPending = true;
    pendingRollTimeouts.forEach(clearTimeout);
    pendingRollTimeouts = [];
    // Snapshot matched count so we know which are "new" when the result lands
    const p = currentState?.players[myId];
    prevMatchedCount = (p && p.has_rolled)
      ? p.dice.filter(d => d === currentState.target).length
      : 0;
    const btn = document.getElementById("roll-btn");
    if (btn) btn.disabled = true;
    startShake();
    ws.send(JSON.stringify({ action: "roll" }));
  }

  // ── Winner overlay ──
  function showWinner(name, target) {
    document.getElementById("winner-name").textContent = name;
    document.getElementById("winner-sub").textContent = `Next up: roll for ${nextTarget(target)}s`;
    document.getElementById("winner-overlay").classList.add("visible");
  }

  function hideWinner() {
    document.getElementById("winner-overlay").classList.remove("visible");
  }

  function nextTarget(t) { return ((t - 2 + 6) % 6) + 1; }

  // ── Message handler ──
  function handleMessage(msg) {
    switch (msg.type) {
      case "welcome":
        myId = msg.player_id;
        break;
      case "state":
        hideWinner();
        if (!msg.started) { showScreen("lobby"); renderLobby(msg); }
        else              { showScreen("game");  renderGame(msg);  }
        break;
      case "round_won":
        if (!currentState?.started) showScreen("game");
        lastMyDiceKey = null; // force re-render after round transition
        {
          const shakeRemaining = Math.max(0, rollShakeEnd - Date.now());
          renderGame(msg);
          // Show winner overlay after shake + landing animation completes
          setTimeout(() => showWinner(msg.winner_name, msg.target), shakeRemaining + 420);
        }
        break;
      case "error":
        setError(msg.msg);
        break;
    }
  }

  // ── Keyboard ──
  document.getElementById("name-input").addEventListener("keydown", e => { if (e.key === "Enter") createGame(); });
  document.getElementById("code-input").addEventListener("keydown", e => { if (e.key === "Enter") joinGame(); });
  document.getElementById("code-input").addEventListener("input",   e => { e.target.value = e.target.value.toUpperCase(); });

  document.addEventListener("keydown", e => {
    if (e.code === "Space" && currentState?.started && !rolling) {
      e.preventDefault();
      const btn = document.getElementById("roll-btn");
      if (btn && !btn.disabled) roll();
    }
  });
</script>
</body>
</html>
