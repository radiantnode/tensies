<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a0e08">
  <title>Tensies 🎲</title>
  <meta property="og:title" content="Come play Tensies!">
  <meta property="og:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta property="og:image" content="/static/images/icon-512.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Come play Tensies!">
  <meta name="twitter:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta name="twitter:image" content="/static/images/icon-512.png">
  <link rel="icon" href="/static/images/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/images/apple-touch-icon-180.png">

  <!-- Installable PWA: a home-screen launch runs standalone (own task, no
       browser tab) so Firefox/Android can't drop a new tab in front of it on
       relaunch, and iOS gets a real home-screen icon + standalone window. -->
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tensies">

  <!-- First-paint assets, warmed before anything blocks. -->
  <link rel="preload" href="/static/images/logo.svg" as="image">
  <link rel="preload" href="/static/images/bar-top.webp" as="image" type="image/webp">
  <link rel="preload" href="/static/fonts/inter-latin-variable.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Critical CSS: layer order, tokens, reset, loading screen, view-transition setup. -->
  <link rel="stylesheet" href="/static/css/critical.css">

  <!-- Non-critical CSS — all downloaded in parallel by the browser. -->
  <link rel="stylesheet" href="/static/css/controls.css">
  <link rel="stylesheet" href="/static/css/shell.css">
  <link rel="stylesheet" href="/static/css/landing.css">
  <link rel="stylesheet" href="/static/css/lobby.css">
  <link rel="stylesheet" href="/static/css/game.css">
  <link rel="stylesheet" href="/static/css/players-bar.css">
  <link rel="stylesheet" href="/static/css/dice.css">
  <link rel="stylesheet" href="/static/css/menu.css">
  <link rel="stylesheet" href="/static/css/overlays.css">

  <!-- Preload the whole module graph so it fetches in parallel instead of
       waterfalling app -> router/net -> components. -->
  <link rel="modulepreload" href="/static/js/app.js">
  <link rel="modulepreload" href="/static/js/dom.js">
  <link rel="modulepreload" href="/static/js/state.js">
  <link rel="modulepreload" href="/static/js/session.js">
  <link rel="modulepreload" href="/static/js/names.js">
  <link rel="modulepreload" href="/static/js/transitions.js">
  <link rel="modulepreload" href="/static/js/router.js">
  <link rel="modulepreload" href="/static/js/net.js">
  <link rel="modulepreload" href="/static/js/touch.js">
  <link rel="modulepreload" href="/static/js/back-button.js">
  <link rel="modulepreload" href="/static/js/scroll-fades.js">
  <link rel="modulepreload" href="/static/js/title-row.js">
  <link rel="modulepreload" href="/static/js/pips.js">
  <link rel="modulepreload" href="/static/js/dice.js">
  <link rel="modulepreload" href="/static/js/dice-positions.js">
  <link rel="modulepreload" href="/static/js/game-render.js">
  <link rel="modulepreload" href="/static/js/animations.js">
  <link rel="modulepreload" href="/static/js/roll.js">
  <link rel="modulepreload" href="/static/js/overlays.js">
  <link rel="modulepreload" href="/static/js/components/app-header.js">
  <link rel="modulepreload" href="/static/js/components/player-card.js">
  <link rel="modulepreload" href="/static/js/components/round-target.js">
  <link rel="modulepreload" href="/static/js/components/landing-screen.js">
  <link rel="modulepreload" href="/static/js/components/join-screen.js">
  <link rel="modulepreload" href="/static/js/components/lobby-screen.js">
  <link rel="modulepreload" href="/static/js/components/game-screen.js">
  <link rel="modulepreload" href="/static/js/components/nav-menu.js">
  <script type="module" src="/static/js/app.js"></script>
</head>
<body>

<main>

  <!-- Inline loading screen: paints from the critical CSS above with no JS.
       The router swaps it for landing/join/lobby/game once the app boots. -->
  <section id="loading" class="screen loading-screen active" aria-labelledby="loading-msg">
    <img src="/static/images/logo.svg" class="logo-mark" alt="">
    <h1 class="logo">TENSIES</h1>
    <div class="loading-bar" aria-hidden="true"><div class="loading-bar-fill"></div></div>
    <p id="loading-msg" class="loading-msg">Loading…</p>
  </section>

  <landing-screen></landing-screen>
  <join-screen></join-screen>
  <lobby-screen></lobby-screen>
  <game-screen></game-screen>

</main>

<nav-menu></nav-menu>

<!-- Non-host wait screen while the game is paused. Body-level <dialog> so the
     board stays live underneath; visually mirrors the loading screen. -->
<dialog id="pause-overlay" class="overlay-dialog pause-overlay" aria-labelledby="pause-overlay-msg">
  <img src="/static/images/logo.svg" class="logo-mark" alt="">
  <h1 class="logo">TENSIES</h1>
  <div class="loading-bar" aria-hidden="true"><div class="loading-bar-fill"></div></div>
  <p id="pause-overlay-msg" class="pause-overlay-msg"></p>
</dialog>

<!-- Round winner/loser celebration. Body-level <dialog> over the live board. -->
<dialog id="winner-overlay" class="overlay-dialog winner-overlay" aria-label="Round winner">
  <div class="winner-box">
    <div class="winner-banner"><span class="winner-banner-label">Round <span class="winner-round-pill" id="winner-round"></span> <span id="winner-banner-suffix">Winner</span></span></div>
    <img src="/static/images/logo-winner.svg" class="winner-logo" alt="" aria-hidden="true">
    <p class="winner-name" id="winner-name"></p>
  </div>
  <div class="winner-timer" aria-hidden="true">
    <div class="winner-timer-bar"><div class="winner-timer-fill" id="winner-timer-fill"></div></div>
    <p class="winner-timer-secs" id="winner-timer-secs"></p>
  </div>
</dialog>

<!-- Orientation guard: Tensies is portrait-only. The web has no true orientation
     lock (the manifest only locks an installed PWA), so on a phone held landscape
     this covers the sideways layout with a rotate prompt. Pure CSS via a
     landscape media query — paints with no JS, like the loading screen. -->
<div id="rotate-overlay" class="rotate-overlay" role="alertdialog" aria-label="Rotate your device to portrait">
  <svg class="rotate-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
    <path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.44 4.84 18.29 0 12 0l-.66.03 3.81 3.81 1.33-1.32zm-6.25-.77c-.59-.59-1.54-.59-2.12 0L1.75 8.11c-.59.59-.59 1.54 0 2.12l12.02 12.02c.59.59 1.54.59 2.12 0l6.36-6.36c.59-.59.59-1.54 0-2.12L10.23 1.75zm4.6 19.44L2.81 9.17l6.36-6.36 12.02 12.02-6.36 6.36zM7.52 21.48C4.25 19.94 1.91 16.76 1.55 13H.05C.56 19.16 5.71 24 12 24l.66-.03-3.81-3.81-1.33 1.32z"/>
  </svg>
  <h2 class="logo rotate-logo">TENSIES</h2>
  <p class="rotate-msg">Best played upright —<br>rotate your device to portrait.</p>
</div>

</body>
</html>
