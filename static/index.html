<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Tensies 🎲</title>
  <meta property="og:title" content="Come play Tensies!">
  <meta property="og:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta property="og:image" content="/static/come-play-teaser.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Come play Tensies!">
  <meta name="twitter:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta name="twitter:image" content="/static/come-play-teaser.png">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/logo.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Landing -->
<div id="landing" class="screen active">
  <img src="/static/logo.svg" class="logo-mark" alt="">
  <div class="logo">TENSIES</div>
  <div class="tagline">Roll all ten to win the round</div>
  <div class="form-stack">
    <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" onclick="createGame()">Create Game</button>
    <button class="btn btn-secondary" onclick="showJoin()">Join Game</button>
    <div class="error-msg" id="landing-error"></div>
  </div>
</div>

<!-- Join -->
<div id="join" class="screen">
  <div class="join-back" onclick="showLanding()">← Back</div>
  <div class="logo">JOIN</div>
  <div class="tagline">Enter your name and game code</div>
  <div class="form-stack">
    <input id="join-name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
    <input id="code-input" class="code-input" type="text" placeholder="ABCDE" maxlength="5" autocomplete="off">
    <button class="btn btn-primary" onclick="joinGame()">Join Game</button>
    <div class="error-msg" id="join-error"></div>
  </div>
</div>

<!-- Lobby -->
<div id="lobby" class="screen">
  <div class="lobby-title">Waiting for players…</div>
  <div class="lobby-hint">Share this link to invite friends</div>
  <div class="code-display" id="lobby-code" onclick="copyCode()">——</div>
  <div class="copy-hint" id="copy-hint">click to copy link</div>
  <a id="sms-btn" class="btn btn-sms" href="#" onclick="return smsTap()">💬 Send Text Invite</a>
  <div class="player-list" id="lobby-players"></div>
  <button id="start-btn" class="btn btn-primary" style="width:100%;max-width:400px;display:none" onclick="startGame()">
    Start Game 🎲
  </button>
  <div id="waiting-msg"></div>
</div>

<!-- Game -->
<div id="game" class="screen">
  <div class="game-topbar">
    <div class="game-title">
      <img src="/static/logo.svg" class="game-title-mark" alt="">
      <span>Tensies</span>
    </div>
    <div class="players-bar" id="players-bar"></div>
  </div>
  <div class="my-area" id="my-area"></div>
</div>

<!-- Winner overlay -->
<div id="winner-overlay">
  <div class="winner-box">
    <div class="confetti">🎉</div>
    <div class="winner-label">Round Winner</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-sub" id="winner-sub"></div>
  </div>
</div>

<!-- Disconnect overlay — shown to connected players while someone reconnects -->
<div id="disconnect-overlay">
  <div class="disconnect-box">
    <div class="disconnect-spinner"></div>
    <div id="disconnect-msg"></div>
  </div>
</div>

<!-- Reconnecting modal — shown to the local player while attempting to reconnect -->
<div id="reconnecting-modal">
  <div class="reconnecting-box">
    <div class="reconnecting-spinner"></div>
    <div>Reconnecting…</div>
  </div>
</div>

<script src="/static/game.js"></script>
</body>
</html>
