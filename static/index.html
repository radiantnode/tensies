<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Tensies 🎲</title>
  <meta property="og:title" content="Come play Tensies!">
  <meta property="og:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta property="og:image" content="/static/images/come-play-teaser.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Come play Tensies!">
  <meta name="twitter:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta name="twitter:image" content="/static/images/come-play-teaser.png">
  <link rel="icon" href="/static/images/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/images/logo.svg">

  <!-- First-paint assets, warmed before anything blocks. -->
  <link rel="preload" href="/static/images/logo.svg" as="image">
  <link rel="preload" href="/static/images/bar-top.webp" as="image" type="image/webp">
  <link rel="preload" href="/static/fonts/inter-latin-variable.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Critical CSS: layer order, tokens, reset, loading screen, view-transition setup. -->
  <link rel="stylesheet" href="/static/css/critical.css">

  <!-- Non-critical CSS — all downloaded in parallel by the browser. -->
  <link rel="stylesheet" href="/static/css/controls.css">
  <link rel="stylesheet" href="/static/css/shell.css">
  <link rel="stylesheet" href="/static/css/landing.css">

  <!-- Preload the whole module graph so it fetches in parallel instead of
       waterfalling app -> router/net -> components. -->
  <link rel="modulepreload" href="/static/js/app.js">
  <link rel="modulepreload" href="/static/js/dom.js">
  <link rel="modulepreload" href="/static/js/state.js">
  <link rel="modulepreload" href="/static/js/session.js">
  <link rel="modulepreload" href="/static/js/names.js">
  <link rel="modulepreload" href="/static/js/transitions.js">
  <link rel="modulepreload" href="/static/js/router.js">
  <link rel="modulepreload" href="/static/js/net.js">
  <link rel="modulepreload" href="/static/js/touch.js">
  <link rel="modulepreload" href="/static/js/components/app-header.js">
  <link rel="modulepreload" href="/static/js/components/landing-screen.js">
  <link rel="modulepreload" href="/static/js/components/join-screen.js">
  <link rel="modulepreload" href="/static/js/components/lobby-screen.js">
  <link rel="modulepreload" href="/static/js/components/game-screen.js">
  <link rel="modulepreload" href="/static/js/components/nav-menu.js">
  <script type="module" src="/static/js/app.js"></script>
</head>
<body>

<main>

  <!-- Inline loading screen: paints from the critical CSS above with no JS.
       The router swaps it for landing/join/lobby/game once the app boots. -->
  <section id="loading" class="screen loading-screen active" aria-labelledby="loading-msg">
    <img src="/static/images/logo.svg" class="logo-mark" alt="">
    <h1 class="logo">TENSIES</h1>
    <div class="loading-bar" aria-hidden="true"><div class="loading-bar-fill"></div></div>
    <p id="loading-msg" class="loading-msg">Loading…</p>
  </section>

  <landing-screen></landing-screen>
  <join-screen></join-screen>
  <lobby-screen></lobby-screen>
  <game-screen></game-screen>

</main>

<nav-menu></nav-menu>

</body>
</html>
