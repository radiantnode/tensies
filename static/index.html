<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Tensies 🎲</title>
  <meta property="og:title" content="Come play Tensies!">
  <meta property="og:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta property="og:image" content="/static/come-play-teaser.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Come play Tensies!">
  <meta name="twitter:description" content="Roll all ten to win the round — real-time multiplayer dice game.">
  <meta name="twitter:image" content="/static/come-play-teaser.png">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/logo.svg">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/loading.css">
  <link rel="stylesheet" href="/static/css/landing.css">
  <link rel="stylesheet" href="/static/css/lobby.css">
  <link rel="stylesheet" href="/static/css/game.css">
  <link rel="stylesheet" href="/static/css/players-bar.css">
  <link rel="stylesheet" href="/static/css/dice.css">
  <link rel="stylesheet" href="/static/css/overlays.css">
  <link rel="stylesheet" href="/static/css/menu.css">
</head>
<body>

<main>

  <section id="loading" class="screen active" aria-labelledby="loading-msg">
    <img src="/static/logo.svg" class="logo-mark" alt="">
    <h1 class="logo">TENSIES</h1>
    <div class="loading-bar" aria-hidden="true">
      <div class="loading-bar-fill"></div>
    </div>
    <p id="loading-msg">Loading…</p>
  </section>

  <section id="landing" class="screen" aria-labelledby="landing-title">
    <img src="/static/logo.svg" class="logo-mark" alt="">
    <h1 id="landing-title" class="logo">TENSIES</h1>
    <p class="tagline">Roll all ten to win the round</p>
    <form id="landing-form" class="form-stack" autocomplete="off" novalidate>
      <input id="name-input" name="name" type="text" aria-label="Your name" placeholder="Your name" maxlength="20">
      <button type="submit" class="btn btn-primary">Create Game</button>
      <button id="show-join-btn" type="button" class="btn btn-secondary">Join Game</button>
      <p class="error-msg" id="landing-error" role="alert" aria-live="polite"></p>
    </form>
  </section>

  <section id="join" class="screen" aria-labelledby="join-title">
    <button id="back-btn" type="button" class="join-back">← Back</button>
    <h1 id="join-title" class="logo">JOIN</h1>
    <p class="tagline">Enter your name and game code</p>
    <form id="join-form" class="form-stack" autocomplete="off" novalidate>
      <input id="join-name-input" name="name" type="text" aria-label="Your name" placeholder="Your name" maxlength="20">
      <input id="code-input" name="code" class="code-input" type="text" aria-label="Game code" inputmode="latin" placeholder="ABCDE" maxlength="5" autocapitalize="characters">
      <button type="submit" class="btn btn-primary">Join Game</button>
      <p class="error-msg" id="join-error" role="alert" aria-live="polite"></p>
    </form>
  </section>

  <section id="lobby" class="screen" aria-labelledby="lobby-title">
    <h1 id="lobby-title" class="lobby-title">Waiting for players…</h1>
    <p class="lobby-hint">Share this link to invite friends</p>
    <button id="lobby-code" type="button" class="code-display" aria-label="Copy invite link">——</button>
    <p class="copy-hint" id="copy-hint">click to copy link</p>
    <button id="sms-btn" type="button" class="btn btn-sms">💬 Send Text Invite</button>
    <ul class="player-list" id="lobby-players" aria-label="Players"></ul>
    <button id="start-btn" type="button" class="btn btn-primary btn-block" hidden>
      Start Game 🎲
    </button>
    <p id="waiting-msg"></p>
  </section>

  <section id="game" class="screen" aria-labelledby="game-title">
    <header class="game-topbar">
      <div class="topbar-title-row">
        <h1 id="game-title" class="game-title">
          <img src="/static/logo.svg" class="game-title-mark" alt="">
          <span>Tensies</span>
        </h1>
        <button id="game-menu-btn" class="game-menu-btn"
                aria-label="Open menu" aria-expanded="false" aria-controls="game-menu">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="players-bar" id="players-bar" role="list" aria-label="Players"></div>
    </header>
    <div id="game-menu" class="game-menu" aria-hidden="true">
      <nav class="menu-panel" aria-label="Game menu">
        <button id="menu-pause-btn" type="button" class="menu-item menu-toggle"
                aria-pressed="false" hidden>
          <span class="menu-item-label">Pause Game</span>
          <span class="menu-switch" aria-hidden="true"></span>
        </button>
        <div id="menu-pause-status" class="menu-status" aria-live="polite" hidden>
          <div class="menu-status-row">
            <span class="menu-status-label">Time remaining</span>
            <span class="menu-status-value" id="pause-remaining">—</span>
          </div>
          <div class="menu-status-row">
            <span class="menu-status-label">Players</span>
            <span class="menu-status-value" id="pause-players">—</span>
          </div>
          <p class="menu-status-hint">Resume when everyone's back.</p>
        </div>
      </nav>
    </div>
    <div class="my-area" id="my-area"></div>
  </section>

</main>

<dialog id="pause-overlay" class="overlay-dialog" aria-labelledby="pause-overlay-msg">
  <img src="/static/logo.svg" class="logo-mark" alt="">
  <h1 class="logo">TENSIES</h1>
  <div class="loading-bar" aria-hidden="true">
    <div class="loading-bar-fill"></div>
  </div>
  <p id="pause-overlay-msg"></p>
</dialog>

<dialog id="winner-overlay" class="overlay-dialog" aria-labelledby="winner-name">
  <div class="winner-box">
    <div class="confetti" aria-hidden="true">🎉</div>
    <p class="winner-label">Round Winner</p>
    <p class="winner-name" id="winner-name"></p>
    <p class="winner-sub" id="winner-sub"></p>
  </div>
</dialog>

<script type="module" src="/static/js/main.js"></script>
<script type="module" src="/static/js/menu.js"></script>
</body>
</html>
