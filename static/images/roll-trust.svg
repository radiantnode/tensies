<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" role="img" aria-label="Roll Trust">
  <defs>
    <linearGradient id="rt-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#166534" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="rt-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#166534" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="rt-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b85"/>
      <stop offset="1" stop-color="#e63a59"/>
    </linearGradient>
    <linearGradient id="rt-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcd9e8"/>
    </linearGradient>
    <filter id="rt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="rt-inner-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <path d="M60 8 L104 26 V68 C104 96 60 128 60 128 S16 96 16 68 V26 Z"
        fill="#4ade80" opacity="0.12" filter="url(#rt-inner-glow)"/>

  <!-- Shield body -->
  <path d="M60 12 L100 28 V66 C100 92 60 122 60 122 S20 92 20 66 V28 Z"
        fill="url(#rt-shield)" stroke="url(#rt-rim)" stroke-width="1.5"/>

  <!-- Inner highlight -->
  <path d="M60 18 L94 32 V46 C94 46 78 18 60 18 Z"
        fill="#4ade80" opacity="0.06"/>

  <!-- Dice pair, centered on shield, overlaying it -->

  <!-- Back die: pink, showing 6 — halo -->
  <g transform="translate(48 54) rotate(-14)" opacity="0.55">
    <rect x="-23" y="-23" width="46" height="46" rx="10" fill="#ff4d6d" filter="url(#rt-glow)"/>
  </g>
  <!-- Back die: pink, showing 6 -->
  <g transform="translate(48 54) rotate(-14)">
    <rect x="-20" y="-20" width="40" height="40" rx="7.5" fill="url(#rt-pink)" stroke="#2a0a14" stroke-width="0.8"/>
    <rect x="-18.5" y="-18.5" width="37" height="10" rx="4.5" fill="#ffffff" opacity="0.12"/>
    <circle cx="-10" cy="-11" r="3" fill="#fff"/>
    <circle cx="-10" cy="0"   r="3" fill="#fff"/>
    <circle cx="-10" cy="11"  r="3" fill="#fff"/>
    <circle cx="10"  cy="-11" r="3" fill="#fff"/>
    <circle cx="10"  cy="0"   r="3" fill="#fff"/>
    <circle cx="10"  cy="11"  r="3" fill="#fff"/>
  </g>

  <!-- Front die: white, showing 4 -->
  <g transform="translate(70 74) rotate(10)">
    <rect x="-19.5" y="-19.5" width="39" height="39" rx="7" fill="#1a1a2e" opacity="0.35" transform="translate(1.5 2.5)"/>
    <rect x="-19" y="-19" width="38" height="38" rx="7" fill="url(#rt-white)" stroke="#1a1a2e" stroke-width="0.8"/>
    <rect x="-17.5" y="-17.5" width="35" height="9" rx="4" fill="#ffffff" opacity="0.6"/>
    <circle cx="-9.5" cy="-9.5" r="3" fill="#1a1a2e"/>
    <circle cx="9.5"  cy="-9.5" r="3" fill="#1a1a2e"/>
    <circle cx="-9.5" cy="9.5"  r="3" fill="#1a1a2e"/>
    <circle cx="9.5"  cy="9.5"  r="3" fill="#1a1a2e"/>
  </g>

</svg>
