<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Tensies">
  <defs>
    <filter id="t-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <linearGradient id="t-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b85"/>
      <stop offset="1" stop-color="#e63a59"/>
    </linearGradient>
    <linearGradient id="t-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcd9e8"/>
    </linearGradient>
  </defs>

  <!-- Accent halo behind back die -->
  <g transform="translate(74 80) rotate(-14)" opacity="0.55">
    <rect x="-46" y="-46" width="92" height="92" rx="20" fill="#ff4d6d" filter="url(#t-glow)"/>
  </g>

  <!-- Back die: pink, showing 6 -->
  <g transform="translate(74 80) rotate(-14)">
    <rect x="-40" y="-40" width="80" height="80" rx="15" fill="url(#t-pink)" stroke="#2a0a14" stroke-width="1.5"/>
    <rect x="-37" y="-37" width="74" height="20" rx="9" fill="#ffffff" opacity="0.12"/>
    <circle cx="-20" cy="-22" r="6" fill="#fff"/>
    <circle cx="-20" cy="0"   r="6" fill="#fff"/>
    <circle cx="-20" cy="22"  r="6" fill="#fff"/>
    <circle cx="20"  cy="-22" r="6" fill="#fff"/>
    <circle cx="20"  cy="0"   r="6" fill="#fff"/>
    <circle cx="20"  cy="22"  r="6" fill="#fff"/>
  </g>

  <!-- Front die: white, showing 4 -->
  <g transform="translate(132 130) rotate(10)">
    <rect x="-39" y="-39" width="78" height="78" rx="14" fill="#1a1a2e" opacity="0.35" transform="translate(3 5)"/>
    <rect x="-38" y="-38" width="76" height="76" rx="14" fill="url(#t-white)" stroke="#1a1a2e" stroke-width="1.5"/>
    <rect x="-35" y="-35" width="70" height="18" rx="8" fill="#ffffff" opacity="0.6"/>
    <circle cx="-19" cy="-19" r="6" fill="#1a1a2e"/>
    <circle cx="19"  cy="-19" r="6" fill="#1a1a2e"/>
    <circle cx="-19" cy="19"  r="6" fill="#1a1a2e"/>
    <circle cx="19"  cy="19"  r="6" fill="#1a1a2e"/>
  </g>
</svg>
