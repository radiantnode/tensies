<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Tensies — broken">
  <!-- Lose-state variant: each die is broken in half along a jagged crack, the
       two halves pulled apart with a dark gap between them. Built by drawing the
       full die twice and clipping to a top / bottom region split by the same
       jagged line, then offsetting the halves in opposite directions. The break
       edge is stroked (clipped to the die outline) to match the outer edge. -->
  <defs>
    <linearGradient id="l-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b85"/>
      <stop offset="1" stop-color="#e63a59"/>
    </linearGradient>
    <linearGradient id="l-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcd9e8"/>
    </linearGradient>
    <!-- Shared jagged split (reused by both dice in their own local space). -->
    <clipPath id="l-top"><path d="M-70,-80 L70,-80 L70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3 Z"/></clipPath>
    <clipPath id="l-bot"><path d="M-70,80 L70,80 L70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3 Z"/></clipPath>
    <!-- Die outlines, to keep the break stroke from spilling past the edges. -->
    <clipPath id="l-die-p"><rect x="-40" y="-40" width="80" height="80" rx="15"/></clipPath>
    <clipPath id="l-die-w"><rect x="-38" y="-38" width="76" height="76" rx="14"/></clipPath>
  </defs>

  <!-- Back die: pink, showing 6 -->
  <g transform="translate(74 80) rotate(-14)">
    <g transform="translate(-2 -5)"><g clip-path="url(#l-top)">
      <rect x="-40" y="-40" width="80" height="80" rx="15" fill="url(#l-pink)" stroke="#2a0a14" stroke-width="1.5"/>
      <rect x="-37" y="-37" width="74" height="20" rx="9" fill="#ffffff" opacity="0.12"/>
      <circle cx="-20" cy="-22" r="6" fill="#fff"/><circle cx="-20" cy="0" r="6" fill="#fff"/><circle cx="-20" cy="22" r="6" fill="#fff"/>
      <circle cx="20" cy="-22" r="6" fill="#fff"/><circle cx="20" cy="0" r="6" fill="#fff"/><circle cx="20" cy="22" r="6" fill="#fff"/>
      <g clip-path="url(#l-die-p)"><path d="M70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3" fill="none" stroke="#2a0a14" stroke-width="3" stroke-linejoin="round"/></g>
    </g></g>
    <g transform="translate(2 6)"><g clip-path="url(#l-bot)">
      <rect x="-40" y="-40" width="80" height="80" rx="15" fill="url(#l-pink)" stroke="#2a0a14" stroke-width="1.5"/>
      <circle cx="-20" cy="-22" r="6" fill="#fff"/><circle cx="-20" cy="0" r="6" fill="#fff"/><circle cx="-20" cy="22" r="6" fill="#fff"/>
      <circle cx="20" cy="-22" r="6" fill="#fff"/><circle cx="20" cy="0" r="6" fill="#fff"/><circle cx="20" cy="22" r="6" fill="#fff"/>
      <g clip-path="url(#l-die-p)"><path d="M70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3" fill="none" stroke="#2a0a14" stroke-width="3" stroke-linejoin="round"/></g>
    </g></g>
  </g>

  <!-- Front die: white, showing 4 -->
  <g transform="translate(132 130) rotate(10)">
    <g transform="translate(-2 -5)"><g clip-path="url(#l-top)">
      <rect x="-38" y="-38" width="76" height="76" rx="14" fill="url(#l-white)" stroke="#1a1a2e" stroke-width="1.5"/>
      <rect x="-35" y="-35" width="70" height="18" rx="8" fill="#ffffff" opacity="0.6"/>
      <circle cx="-19" cy="-19" r="6" fill="#1a1a2e"/><circle cx="19" cy="-19" r="6" fill="#1a1a2e"/>
      <circle cx="-19" cy="19" r="6" fill="#1a1a2e"/><circle cx="19" cy="19" r="6" fill="#1a1a2e"/>
      <g clip-path="url(#l-die-w)"><path d="M70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/></g>
    </g></g>
    <g transform="translate(2 6)"><g clip-path="url(#l-bot)">
      <rect x="-38" y="-38" width="76" height="76" rx="14" fill="url(#l-white)" stroke="#1a1a2e" stroke-width="1.5"/>
      <circle cx="-19" cy="-19" r="6" fill="#1a1a2e"/><circle cx="19" cy="-19" r="6" fill="#1a1a2e"/>
      <circle cx="-19" cy="19" r="6" fill="#1a1a2e"/><circle cx="19" cy="19" r="6" fill="#1a1a2e"/>
      <g clip-path="url(#l-die-w)"><path d="M70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/></g>
    </g></g>
  </g>
</svg>
