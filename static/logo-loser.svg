<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Tensies — broken">
  <!-- Lose-state variant: dice broken in half. Each die gets ONE continuous rim
       glow behind both pieces (not split at the fracture) so the warm halo wraps
       the outer edge without being knife-cut where the crack meets the edge. The
       break itself is a raw fracture: a dark crevice line, no glow on it. -->
  <defs>
    <filter id="w-glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="w-rim" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4.6"/></filter>
    <radialGradient id="w-rimg" cx="1" cy="0" r="1.25">
      <stop offset="0"    stop-color="#fff4dc"/>
      <stop offset="0.32" stop-color="#ffc074"/>
      <stop offset="0.7"  stop-color="#cf924c" stop-opacity="0.5"/>
      <stop offset="1"    stop-color="#9c6a35" stop-opacity="0.12"/>
    </radialGradient>
    <linearGradient id="l-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b85"/><stop offset="1" stop-color="#e63a59"/>
    </linearGradient>
    <linearGradient id="l-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#dcd9e8"/>
    </linearGradient>
    <clipPath id="l-top"><path d="M-70,-80 L70,-80 L70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3 Z"/></clipPath>
    <clipPath id="l-bot"><path d="M-70,80 L70,80 L70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3 Z"/></clipPath>
    <clipPath id="l-die-p"><rect x="-40" y="-40" width="80" height="80" rx="15"/></clipPath>
    <clipPath id="l-die-w"><rect x="-38" y="-38" width="76" height="76" rx="14"/></clipPath>
    <!-- Fade the rim glow out at the right-side fracture junction (the bottom-right
         of each top half), so the broken corner softly loses its halo instead of
         glowing through. Black core = no glow, padding to white = full glow. -->
    <radialGradient id="l-fade-p" cx="40" cy="2" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000"/><stop offset="0.4" stop-color="#000"/><stop offset="1" stop-color="#fff"/>
    </radialGradient>
    <mask id="l-glowmask-p" maskUnits="userSpaceOnUse" x="-70" y="-70" width="140" height="140">
      <rect x="-70" y="-70" width="140" height="140" fill="url(#l-fade-p)"/>
    </mask>
    <radialGradient id="l-fade-w" cx="38" cy="2" r="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000"/><stop offset="0.4" stop-color="#000"/><stop offset="1" stop-color="#fff"/>
    </radialGradient>
    <mask id="l-glowmask-w" maskUnits="userSpaceOnUse" x="-70" y="-70" width="140" height="140">
      <rect x="-70" y="-70" width="140" height="140" fill="url(#l-fade-w)"/>
    </mask>
  </defs>

  <!-- Back die: pink, showing 6 -->
  <g transform="translate(74 80) rotate(-14)">
    <rect x="-40" y="-40" width="80" height="80" rx="15" fill="none" stroke="url(#w-rimg)" stroke-width="8.5" filter="url(#w-rim)" mask="url(#l-glowmask-p)"/>
    <g transform="translate(-2 -5)">
      <g clip-path="url(#l-top)">
        <rect x="-40" y="-40" width="80" height="80" rx="15" fill="url(#l-pink)" stroke="url(#w-rimg)" stroke-width="2.2"/>
        <circle cx="34" cy="-34" r="15" fill="#ffe7c2" opacity="0.65" filter="url(#w-glow)"/>
        <rect x="-37" y="-37" width="74" height="20" rx="9" fill="#ffffff" opacity="0.12"/>
        <circle cx="-20" cy="-22" r="6" fill="#fff"/><circle cx="-20" cy="0" r="6" fill="#fff"/><circle cx="-20" cy="22" r="6" fill="#fff"/>
        <circle cx="20" cy="-22" r="6" fill="#fff"/><circle cx="20" cy="0" r="6" fill="#fff"/><circle cx="20" cy="22" r="6" fill="#fff"/>
      </g>
      <!-- upper piece's bottom edge: raw fracture (warm, blends with the bg) -->
      <g clip-path="url(#l-die-p)"><path d="M70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3" fill="none" stroke="#6a513c" stroke-width="1.6" stroke-linejoin="round" opacity="0.35"/></g>
    </g>
    <g transform="translate(2 6)">
      <g clip-path="url(#l-bot)">
        <rect x="-40" y="-40" width="80" height="80" rx="15" fill="url(#l-pink)" stroke="url(#w-rimg)" stroke-width="2.2"/>
        <circle cx="-20" cy="-22" r="6" fill="#fff"/><circle cx="-20" cy="0" r="6" fill="#fff"/><circle cx="-20" cy="22" r="6" fill="#fff"/>
        <circle cx="20" cy="-22" r="6" fill="#fff"/><circle cx="20" cy="0" r="6" fill="#fff"/><circle cx="20" cy="22" r="6" fill="#fff"/>
      </g>
      <!-- lower piece's top edge: raw fracture only (no lit lip) -->
      <g clip-path="url(#l-die-p)">
        <path d="M70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3" fill="none" stroke="#6a513c" stroke-width="1.5" stroke-linejoin="round" opacity="0.35"/>
      </g>
    </g>
  </g>

  <!-- Front die: white, showing 4 -->
  <g transform="translate(132 130) rotate(10)">
    <rect x="-38" y="-38" width="76" height="76" rx="14" fill="none" stroke="url(#w-rimg)" stroke-width="8.5" filter="url(#w-rim)" mask="url(#l-glowmask-w)"/>
    <g transform="translate(-2 -5)">
      <g clip-path="url(#l-top)">
        <rect x="-38" y="-38" width="76" height="76" rx="14" fill="url(#l-white)" stroke="url(#w-rimg)" stroke-width="2.2"/>
        <rect x="-35" y="-35" width="70" height="18" rx="8" fill="#ffffff" opacity="0.6"/>
        <circle cx="-19" cy="-19" r="6" fill="#1a1a2e"/><circle cx="19" cy="-19" r="6" fill="#1a1a2e"/>
        <circle cx="-19" cy="19" r="6" fill="#1a1a2e"/><circle cx="19" cy="19" r="6" fill="#1a1a2e"/>
      </g>
      <g clip-path="url(#l-die-w)"><path d="M70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3" fill="none" stroke="#6a513c" stroke-width="1.6" stroke-linejoin="round" opacity="0.35"/></g>
    </g>
    <g transform="translate(2 6)">
      <g clip-path="url(#l-bot)">
        <rect x="-38" y="-38" width="76" height="76" rx="14" fill="url(#l-white)" stroke="url(#w-rimg)" stroke-width="2.2"/>
        <circle cx="-19" cy="-19" r="6" fill="#1a1a2e"/><circle cx="19" cy="-19" r="6" fill="#1a1a2e"/>
        <circle cx="-19" cy="19" r="6" fill="#1a1a2e"/><circle cx="19" cy="19" r="6" fill="#1a1a2e"/>
      </g>
      <g clip-path="url(#l-die-w)">
        <path d="M70,1 L34,7 L18,-4 L2,6 L-14,-3 L-32,8 L-70,3" fill="none" stroke="#6a513c" stroke-width="1.5" stroke-linejoin="round" opacity="0.35"/>
      </g>
    </g>
  </g>
</svg>
