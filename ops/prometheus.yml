global:
  scrape_interval: 2s
  evaluation_interval: 10s

scrape_configs:
  - job_name: tensies
    static_configs:
      - targets: ['web:8000']
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
