global:
  scrape_interval: 2s
  evaluation_interval: 10s

scrape_configs:
  - job_name: tensies
    static_configs:
      - targets: ['web:8000']
    metrics_path: /metrics
    # /metrics is bearer-gated in dev too (audit M2). The token is read from a
    # mounted file (gitignored) so any METRICS_TOKEN works without committing a
    # secret. Create/refresh it to match your .env:
    #   mkdir -p ops/secrets
    #   printf '%s' "${METRICS_TOKEN:-devmetrics}" > ops/secrets/metrics_token
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/metrics_token

  - job_name: postgres
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
