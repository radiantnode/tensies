apiVersion: 1

# Prod datasource provisioning. The Postgres password is read from the mounted
# secret file via Grafana's $__file{} provider — so it's never in Grafana's
# environment (nor committed, unlike the dev provisioning/datasources).
datasources:
  - name: Postgres
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: tensies
    secureJsonData:
      password: $__file{/run/secrets/pg_password}
    jsonData:
      database: tensies
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: false
