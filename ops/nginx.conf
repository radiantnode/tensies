# Reverse proxy / load balancer in front of the scaled `web` containers.
#
# Topology: Cloudflare -> host cloudflared -> nginx (this, the only published
# port) -> web:8000 (Docker DNS resolves the service name to every replica).
#
# Scaling: `--scale web=N` adds/removes containers; nginx picks them up on the
# next config load, so reload after scaling:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod exec nginx nginx -s reload
# (Or switch to the resolver-based block below for hands-off re-resolution.)
worker_processes auto;
events { worker_connections 4096; }

http {
    # `server web:8000;` resolves to ALL web replica IPs at config load and
    # round-robins them. Re-resolved on `nginx -s reload` (run after scaling).
    upstream tensies {
        server web:8000;
    }

    # WebSocket upgrade passthrough: Connection: upgrade for /ws, close otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # The only ingress is the Cloudflare tunnel, so trust Cloudflare's
        # authoritative client IP and hand the app exactly one X-Forwarded-For
        # entry. Keeps the per-IP abuse limits correct with TRUSTED_PROXY_HOPS=1.
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host              $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        location / {
            proxy_pass http://tensies;
            proxy_read_timeout 75s;
        }

        # Long-lived game sockets — don't let nginx time them out at 60s.
        location /ws {
            proxy_pass http://tensies;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}

# ── Hands-off alternative (no reload needed on scale) ─────────────────────────
# Replace the `upstream` block + both `proxy_pass http://tensies;` lines with a
# resolver that re-resolves the service name per request (within `valid`):
#
#   resolver 127.0.0.11 valid=10s;          # Docker's embedded DNS
#   ...
#   location / {
#       set $backend http://web:8000;       # variable -> per-request resolution
#       proxy_pass $backend;
#   }
#
# Trade-off: picks up scaling automatically (~10s) but loses upstream features
# (keepalive pools, least_conn). For occasional scale-by-one, the static
# upstream above plus a reload is simpler and gives better balancing control.
