# Reverse proxy / load balancer + static file server in front of the scaled
# `web` containers.
#
# Topology: Cloudflare -> host cloudflared -> nginx (this, the only published
# port) -> web:8000 (Docker DNS resolves the service name to every replica).
#
# Static assets (everything under /static) are bundled + fingerprinted into
# /srv/dist at image-build time (scripts/build_assets.mjs) and baked into this
# image, so nginx serves them straight from disk — sendfile + precompressed
# gzip_static + a far-future immutable cache — without ever touching the app.
# The app only handles the HTML document, /ws, /metrics and /stats.
#
# Scaling: `--scale web=N` adds/removes containers; nginx picks them up on the
# next config load, so reload after scaling:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod exec nginx nginx -s reload
worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;   # correct Content-Type when serving from disk
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    gzip_static on;   # serve the .gz siblings built at image-build time (zero CPU)

    # `server web:8000;` resolves to ALL web replica IPs at config load and
    # round-robins them. Re-resolved on `nginx -s reload` (run after scaling).
    upstream tensies {
        server web:8000;
    }

    # WebSocket upgrade passthrough: Connection: upgrade for /ws, close otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # The only ingress is the Cloudflare tunnel, so trust Cloudflare's
        # authoritative client IP and hand the app exactly one X-Forwarded-For
        # entry. Keeps the per-IP abuse limits correct with TRUSTED_PROXY_HOPS=1.
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host              $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Fingerprinted, immutable static assets — served straight from the
        # baked-in dist, never proxied to the app. Every filename carries a
        # content hash, so a far-future immutable cache is always safe.
        location /static/ {
            root /srv/dist;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            try_files $uri =404;
        }

        # Everything else is the app's: the HTML document (/ and the /<code>
        # deeplink), the WebSocket, and the gated /metrics + /stats endpoints.
        # The document carries the dynamic CSP/HSTS from the app middleware.
        location / {
            proxy_pass http://tensies;
            proxy_read_timeout 75s;
        }

        # Long-lived game sockets — don't let nginx time them out at 60s.
        location /ws {
            proxy_pass http://tensies;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
