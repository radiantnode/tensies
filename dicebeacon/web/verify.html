<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dicebeacon — verify dice</title>
    <style>
      body { font: 16px/1.5 system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; color: #1a1a2e; }
      h1 { font-size: 1.4rem; }
      .dv-card { border: 1px solid #d0d0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1rem; }
      .dv-ok { border-color: #1b9e57; background: #f2fbf6; }
      .dv-fail, .dv-error { border-color: #d23; background: #fdf2f3; }
      .dv-headline { font-weight: 700; margin-bottom: .5rem; }
      .dv-dice { display: flex; gap: .4rem; flex-wrap: wrap; margin: .5rem 0; }
      .dv-die { display: grid; place-items: center; width: 2rem; height: 2rem; border-radius: 6px; background: #1a1a2e; color: #fff; font-weight: 700; }
      .dv-sources, .dv-checks { margin: .25rem 0; padding-left: 1.1rem; }
      .dv-sources em { color: #555; font-style: normal; background: #eee; border-radius: 4px; padding: 0 .35rem; font-size: .8rem; }
      .dv-sources small { display: block; color: #777; font-size: .78rem; }
      .dv-pass { color: #1b9e57; } .dv-fail { color: #d23; }
      .dv-seed { display: block; margin-top: .5rem; word-break: break-all; color: #555; font-size: .78rem; }
      details summary { cursor: pointer; margin-top: .5rem; font-weight: 600; }
      textarea { width: 100%; min-height: 8rem; font-family: ui-monospace, monospace; font-size: .8rem; margin-top: 1rem; }
      button { margin-top: .5rem; padding: .5rem 1rem; border-radius: 8px; border: 0; background: #1a1a2e; color: #fff; font-weight: 600; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Verify your dice 🎲</h1>
    <p>Paste a <code>reveal.json</code> below (or load one via <code>?src=…</code>). Your browser
      re-derives the dice from scratch — nothing here trusts any server.</p>

    <dice-verifier id="dv"></dice-verifier>

    <textarea id="json" placeholder="paste reveal.json here…"></textarea>
    <button id="go">Verify locally</button>

    <script type="module">
      import './dice-verifier.mjs';
      const dv = document.getElementById('dv');
      const params = new URLSearchParams(location.search);
      // Default to the committed sample reveal so the page self-demonstrates.
      dv.setAttribute('src', params.get('src') || 'sample-reveal.json');
      document.getElementById('go').addEventListener('click', () => {
        try {
          dv.reveal = JSON.parse(document.getElementById('json').value);
          dv.verify(dv.reveal);
        } catch (e) {
          alert('Invalid JSON: ' + e);
        }
      });
    </script>
  </body>
</html>
