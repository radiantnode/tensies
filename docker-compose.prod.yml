# Production-oriented stack (audit C1 / deployment hardening).
#
# Differences from docker-compose.yml (local dev):
#   - Runs the built image (no repo bind-mount), no --reload, non-root user.
#   - ONLY the app port is published. Postgres, Redis, Prometheus and Grafana
#     live on an internal network and are never exposed to the host/internet.
#   - All credentials come from the environment (see .env.prod.example); there
#     are NO defaults — compose will error if a required secret is unset.
#   - Anonymous Grafana is OFF; admin password from env; Live origins restricted.
#   - /metrics and /stats/* are gated by bearer tokens (Prometheus scrapes with
#     a mounted token file over the internal network).
#   - Images are pinned by @sha256 digest (multi-arch index digest) for full
#     reproducibility; the tag is kept alongside for readability. Re-resolve
#     after a bump with: docker buildx imagetools inspect <image:tag>.
#
# Usage:
#   cp .env.prod.example .env.prod && edit it
#   echo -n "$METRICS_TOKEN" > ops/secrets/metrics_token
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# The `nginx` service is the single published port and round-robins across the
# `web` replicas (they share Redis, so any instance serves any game; no sticky
# sessions). To run multiple app instances, scale `web` then reload nginx so it
# re-resolves the new set:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --scale web=3
#   docker compose -f docker-compose.prod.yml --env-file .env.prod exec nginx nginx -s reload

services:
  web:
    build: .
    image: tensies:latest
    # Internal only. The nginx service below is the single published port and
    # load-balances across web replicas (scale with --scale web=N). Reaching web
    # directly isn't needed; nginx talks to it over the internal network.
    expose:
      - "8000"
    environment:
      # Every credential is delivered as a mounted file (see the `secrets:` block
      # below + the top-level definitions), NOT an env var — so none of them show
      # up in `docker inspect` or /proc/<pid>/environ. config._secret() reads the
      # matching *_FILE path. The redis URL / postgres DSN carry their passwords
      # inline, so the whole connection string lives in its secret file.
      REDIS_URL_FILE: /run/secrets/redis_url
      POSTGRES_DSN_FILE: /run/secrets/pg_dsn
      GRAFANA_LIVE_URL: http://grafana:3000/api/live/push
      GRAFANA_USER: admin
      GRAFANA_PASS_FILE: /run/secrets/grafana_admin_password
      METRICS_TOKEN_FILE: /run/secrets/metrics_token
      STATS_TOKEN_FILE: /run/secrets/stats_token
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS}"
      # Public origin → absolute og:image/twitter:image so the iOS share sheet can
      # render the invite-link preview with the Tensies icon. Optional; relative
      # when unset.
      APP_URL: "${APP_URL:-}"
      # Behind the TLS proxy / LB: derive the real client IP from X-Forwarded-For
      # so per-IP caps + rate limits (audit H1) key on the user, not the proxy.
      # Set TRUSTED_PROXY_HOPS to the number of proxies that append to XFF.
      TRUST_PROXY_HEADERS: "1"
      TRUSTED_PROXY_HOPS: "${TRUSTED_PROXY_HOPS:-1}"
      # Real HTTPS deploy: send HSTS and add upgrade-insecure-requests to the CSP.
      # Opt into includeSubDomains/preload only once every subdomain is HTTPS.
      HSTS_ENABLED: "1"
      HSTS_INCLUDE_SUBDOMAINS: "${HSTS_INCLUDE_SUBDOMAINS:-0}"
      HSTS_PRELOAD: "${HSTS_PRELOAD:-0}"
      # Allowlist extra hosts on specific CSP directives without rewriting the
      # whole policy (e.g. a Cloudflare Web Analytics beacon). Space/comma list.
      CSP_EXTRA_SCRIPT_SRC: "${CSP_EXTRA_SCRIPT_SRC:-}"
      CSP_EXTRA_CONNECT_SRC: "${CSP_EXTRA_CONNECT_SRC:-}"
      CSP_EXTRA_IMG_SRC: "${CSP_EXTRA_IMG_SRC:-}"
      # Signs JWT auth tokens. Delivered as a mounted file (see `secrets:` below),
      # not an env var. Generate with: openssl rand -hex 32
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      # WebAuthn relying party ID — the bare domain users register passkeys on
      # (no scheme, no port). e.g. "tensies.app"
      WEBAUTHN_RP_ID: "${WEBAUTHN_RP_ID:?set WEBAUTHN_RP_ID}"
      # Display name shown in the browser's passkey prompt. Defaults to "Tensies".
      WEBAUTHN_RP_NAME: "${WEBAUTHN_RP_NAME:-Tensies}"
      # Allowed origins for WebAuthn ceremonies (scheme + domain, no trailing
      # slash). Defaults to ALLOWED_ORIGINS, which is correct when the app and
      # the passkey domain are the same. e.g. "https://tensies.app"
      WEBAUTHN_ORIGIN: "${WEBAUTHN_ORIGIN:-${ALLOWED_ORIGINS}}"
      ENABLE_DRAND_ROLLING: "${ENABLE_DRAND_ROLLING:-1}"
      TELEMETRY_ENABLED: "1"
      # Discord game-status notifier (optional). Off unless DISCORD_ENABLED is
      # set; the bot token is a secret — pass it via .env.prod, never inline.
      DISCORD_ENABLED: "${DISCORD_ENABLED:-0}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      DISCORD_CHANNEL_ID: "${DISCORD_CHANNEL_ID:-}"
      DISCORD_PUBLIC_KEY: "${DISCORD_PUBLIC_KEY:-}"
      DISCORD_APPLICATION_ID: "${DISCORD_APPLICATION_ID:-}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:-}"
      # Prod static-asset mode: serve the prebuilt, fingerprinted index.html that
      # the build baked into the image (nginx serves everything under /static).
      # The app does zero asset work — no in-process JS cache, no StaticFiles.
      FRONTEND_DIST: /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # `edge` carries the only outbound internet the stack needs (the drand beacon
    # + Discord); `internal` (egress-disabled) reaches redis/postgres/grafana. The
    # backends sit on `internal` only, so a compromised one can't phone home.
    networks: [internal, edge]
    restart: unless-stopped
    secrets:
      - jwt_secret
      - stats_token
      - metrics_token
      - redis_url
      - pg_dsn
      - grafana_admin_password
    # ── Hardening ──────────────────────────────────────────────────────────
    # The app writes nothing to disk at runtime and PYTHONDONTWRITEBYTECODE is
    # set, so the root FS is read-only; only /tmp is a (small) tmpfs, mounted
    # noexec/nosuid/nodev so the one writable path can't be used to stage and run
    # a binary. No Linux capabilities are needed (uvicorn binds 8000, a high port,
    # as a non-root user) and no-new-privileges blocks any setuid escalation.
    # init: true gives uvicorn a real PID 1 for signal handling + zombie reaping.
    # Resource + pid caps bound the blast radius of a runaway/compromised worker.
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    init: true
    pids_limit: 256
    cpus: 1.0
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/',timeout=4).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Single published port + load balancer across the web replicas, and the
  # static file server for /static. Host cloudflared keeps pointing at
  # ${WEB_PUBLISH} (this), unchanged. Built from the `nginx` stage in
  # ./Dockerfile: stock nginx with ops/nginx.conf and the prebuilt, fingerprinted
  # frontend bundle (dist/static) baked in — so /static is served straight from
  # disk with no runtime volume. Config + scaling notes live in ops/nginx.conf.
  # After `--scale web=N`, reload nginx:
  #   docker compose -f docker-compose.prod.yml --env-file .env.prod exec nginx nginx -s reload
  nginx:
    build:
      context: .
      target: nginx
    image: tensies-nginx:latest
    # Container listens on 8080 (unprivileged nginx, non-root master). Host
    # cloudflared keeps pointing at ${WEB_PUBLISH}, unchanged.
    ports:
      - "${WEB_PUBLISH:-127.0.0.1:8000}:8080"
    depends_on: [web]
    # `edge` only: nginx needs a non-internal network for its published port to
    # work (Docker won't NAT a host port to an internal-only container) and to
    # reach `web` (also on edge). It never initiates outbound itself.
    networks: [edge]
    restart: unless-stopped
    # Read-only root FS: nginx's pid, temp dirs, and logs are routed to /tmp +
    # stdout/stderr in ops/nginx.conf, so /tmp (tmpfs) is the only writable path.
    # Non-root master on a high port means no caps and no privilege escalation.
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    cpus: 0.5
    mem_limit: 128m

  redis:
    image: redis:7.4.1-alpine@sha256:c1e88455c85225310bbea54816e9c3f4b5295815e6dbf80c34d40afc6df28275
    # Run directly as the redis user so the entrypoint never needs to drop privs
    # (su-exec would require CAP_SETUID/SETGID, which we drop below).
    user: redis
    # The password comes from a mounted secret file. We materialise a tiny config
    # on the /tmp tmpfs and exec redis-server against it, rather than passing
    # --requirepass on the command line — so the password never lands in the
    # process argv (visible via `ps` / /proc/<pid>/cmdline) or the environment.
    # `cat` runs as a child, so the secret isn't in the `sh -c` argv either.
    entrypoint: ["sh", "-c"]
    command:
      - |
        printf 'requirepass %s\nsave ""\nappendonly no\n' "$$(cat /run/secrets/redis_password)" > /tmp/redis.conf
        exec redis-server /tmp/redis.conf
    secrets:
      - redis_password
    # Persistence is off (no RDB/AOF), so the root FS can be read-only; only the
    # /tmp tmpfs (for the generated config) is writable. No caps / no escalation.
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    cpus: 0.5
    mem_limit: 256m
    healthcheck:
      # REDISCLI_AUTH keeps the password out of argv (vs redis-cli -a <pw>).
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$(cat /run/secrets/redis_password)\" redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  postgres:
    image: postgres:16.4-alpine@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    environment:
      POSTGRES_USER: tensies
      # Read from a mounted secret file instead of the environment.
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_DB: tensies
    secrets:
      - pg_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Read-only root FS: the data dir lives on its volume and the runtime scratch
    # paths (/tmp + the postgres socket dir) are tmpfs. The entrypoint starts as
    # root to chown the data dir and gosu-drops to the postgres user, so it keeps
    # exactly the caps that needs and nothing else.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,nodev
      - /run/postgresql:size=64m,mode=0775,uid=70,gid=70,nosuid,nodev
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    cpus: 1.0
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tensies"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1@sha256:f6639335d34a77d9d9db382b92eeb7fc00934be8eae81dbc03b31cfe90411a94
    volumes:
      - ./ops/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/secrets/metrics_token:/etc/prometheus/metrics_token:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=365d'
    # Reads config read-only, writes only the prom_data volume — so the root FS
    # can be read-only. Runs as nobody already; drop all caps + escalation.
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    cpus: 0.5
    mem_limit: 512m
    networks: [internal]
    restart: unless-stopped

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0@sha256:386b12d19eab2a37d7cd8ca8b4c7491cc7a830d9581f49af6c98a393da9605e6
    environment:
      # Split form so the password comes from a mounted secret file, not the DSN
      # in the environment.
      DATA_SOURCE_URI: "postgres:5432/tensies?sslmode=disable"
      DATA_SOURCE_USER: tensies
      DATA_SOURCE_PASS_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    # Stateless Go binary that writes nothing — fully locked down.
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    cpus: 0.25
    mem_limit: 128m
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0@sha256:408afb9726de5122b00a2576763a8a57a3c86d5b0eff5305bc994ceb3eb96c3f
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Admin password from a mounted secret file (Grafana's __FILE convention).
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_LIVE_ALLOWED_ORIGINS: "${GRAFANA_ROOT_URL:?set GRAFANA_ROOT_URL}"
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/live-games.json
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:?set GRAFANA_ROOT_URL}"
      # No outbound internet on the `internal` network — turn off the update check
      # and usage analytics so Grafana doesn't try (and log failures) on boot.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      # Retained to match dev dashboard rendering (owner decision: don't change
      # the Grafana flag). The stored-XSS vector via player names is closed at
      # the source instead — names are sanitized server-side at intake (M1).
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
    # The Postgres datasource password is read from the mounted secret file via
    # Grafana's $__file{} provider (see provisioning-prod/datasources.yaml), so no
    # DB password is in Grafana's environment.
    secrets:
      - grafana_admin_password
      - pg_password
    volumes:
      - ./ops/grafana/provisioning-prod/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    # Read-only root FS: Grafana writes its sqlite + plugins under /var/lib/grafana
    # (the volume) and provisioning is mounted read-only; /tmp is the only other
    # writable path it needs. Runs as the non-root grafana user already.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,nodev
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    cpus: 1.0
    mem_limit: 512m
    # Direct Grafana access on the host. Defaults to loopback (reach it via an
    # SSH tunnel: `ssh -L 8889:127.0.0.1:8889 user@host`). To expose it on the
    # box's network set GRAFANA_PUBLISH to e.g. 0.0.0.0:8889 — but Grafana's
    # admin UI shouldn't face the public internet; tunnel or firewall it.
    ports:
      - "${GRAFANA_PUBLISH:-127.0.0.1:8889}:3000"
    # `edge` is required for the host-published admin port (Docker won't NAT a
    # host port to an internal-only container); `internal` reaches postgres +
    # prometheus. Being on edge means Grafana can phone home (plugin/update
    # checks) — those are disabled above; the true data stores stay egress-free.
    networks: [internal, edge]
    depends_on:
      - prometheus
      - postgres
    restart: unless-stopped

networks:
  # Egress-disabled: services on `internal` have NO route to the internet. The
  # data stores — redis, postgres, postgres_exporter, prometheus — sit on this
  # network ONLY, so a compromised one can't exfiltrate or pull a second-stage
  # payload. (Docker also won't NAT a host port to an internal-only container, so
  # anything that needs a published port must also join `edge` below.)
  internal:
    driver: bridge
    internal: true
  # Has a gateway (egress + host-published ports). Joined only by the services
  # that genuinely need it: web (drand beacon + Discord egress), nginx (the
  # public ingress port), and grafana (its admin UI port; its outbound phone-home
  # is disabled via GF_ANALYTICS_* above).
  edge:
    driver: bridge

# All secrets are mounted into the consuming containers as files under
# /run/secrets (kept out of the environment, so they don't show up in
# `docker inspect` or /proc/<pid>/environ). Materialise the source files before
# `up` — they're gitignored under ops/secrets/. See .env.prod.example for a
# one-liner that derives them all from .env.prod, e.g.:
#   printf 'redis://:%s@redis:6379/0' "$REDIS_PASSWORD" > ops/secrets/redis_url
secrets:
  jwt_secret:
    file: ./ops/secrets/jwt_secret
  stats_token:
    file: ./ops/secrets/stats_token
  metrics_token:
    file: ./ops/secrets/metrics_token
  redis_password:
    file: ./ops/secrets/redis_password
  redis_url:
    file: ./ops/secrets/redis_url
  pg_password:
    file: ./ops/secrets/pg_password
  pg_dsn:
    file: ./ops/secrets/pg_dsn
  grafana_admin_password:
    file: ./ops/secrets/grafana_admin_password

volumes:
  pg_data:
  prom_data:
  grafana_data:
