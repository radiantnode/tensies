# LOCAL DEVELOPMENT ONLY. Publishes Postgres/Grafana to the host with default
# credentials and runs uvicorn with --reload + a repo bind-mount. Do NOT expose
# this beyond localhost — use docker-compose.prod.yml for any shared/public deploy.
services:
  web:
    build: .
    ports:
      - "8888:8000"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      POSTGRES_DSN: postgresql://tensies:tensies@postgres:5432/tensies
      GRAFANA_LIVE_URL: http://grafana:3000/api/live/push
      GRAFANA_USER: admin
      GRAFANA_PASS: admin
      # Dev also runs /metrics + /stats authenticated (audit M2). These are
      # local-only dev tokens; Prometheus sends METRICS_TOKEN (see ops/prometheus.yml).
      METRICS_TOKEN: ${METRICS_TOKEN:-devmetrics}
      STATS_TOKEN: ${STATS_TOKEN:-devstats}
      CREATE_RATE_MAX: ${CREATE_RATE_MAX:-10}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-do-not-use-in-prod}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-tensies.app}
      WEBAUTHN_ORIGIN: http://localhost:8888,https://dev.tensies.app
      CSP_EXTRA_IMG_SRC: ${CSP_EXTRA_IMG_SRC:-}
      APP_URL: ${APP_URL:-https://tensies.app}
      ENABLE_DRAND_ROLLING: ${ENABLE_DRAND_ROLLING:-1}
      TAS_ENABLED: ${TAS_ENABLED:-1}
      TAS_LAT: ${TAS_LAT:-33.20}
      TAS_LON: ${TAS_LON:--96.63}
      TAS_SNARKINESS: ${TAS_SNARKINESS:-insufferable}
      DISCORD_ENABLED: ${DISCORD_ENABLED:-0}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7.4-alpine
    # Password-protected and NOT published to the host even in dev, so the
    # pattern matches prod. Ephemeral: no persistence (game state is disposable).
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-devpassword}",
              "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tensies
      POSTGRES_PASSWORD: tensies
      POSTGRES_DB: tensies
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tensies"]
      interval: 3s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Bearer token for the /metrics scrape — must match METRICS_TOKEN. Create
      # with: printf '%s' "${METRICS_TOKEN:-devmetrics}" > ops/secrets/metrics_token
      - ./ops/secrets/metrics_token:/etc/prometheus/metrics_token:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=365d'

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://tensies:tensies@postgres:5432/tensies?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_BASIC_ENABLED: "true"
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_LIVE_ALLOWED_ORIGINS: "*"
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/live-games.json
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:8889}"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "8889:3000"
    depends_on:
      - prometheus
      - postgres

volumes:
  pg_data:
  prom_data:
  grafana_data:
